<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐡 דג הנגיל – הרפתקה תת-ימית</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at center, #001133 0%, #000510 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      overflow: hidden;
      user-select: none;
    }
    #wrapper {
      position: relative;
      width: 900px;
      height: 600px;
    }
    canvas {
      display: block;
      border-radius: 16px;
      box-shadow:
        0 0 0 2px rgba(80,180,255,0.3),
        0 0 40px rgba(0,150,255,0.5),
        0 0 100px rgba(0,80,200,0.3);
    }
  </style>
</head>
<body>
<div id="wrapper">
  <canvas id="game" width="900" height="600"></canvas>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const W = 900, H = 600;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const STATES = { MENU:0, COUNTDOWN:1, PLAYING:2, PAUSED:3, DEAD:4, LEVEL_UP:5, WIN:6 };

/* ═══════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════ */
const rnd   = (a,b) => Math.random()*(b-a)+a;
const rndI  = (a,b) => Math.min(b, Math.floor(Math.random()*(b-a+1))+a);
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const dist  = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const lerp  = (a,b,t) => a+(b-a)*t;

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

/* ═══════════════════════════════════════════
   AUDIO (Web Audio API – procedural SFX)
═══════════════════════════════════════════ */
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, duration, vol=0.15, attack=0.01, decay=0.1) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ac.currentTime + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + duration + 0.05);
  } catch(e) {}
}
function sfxEat()    { playTone(880,'sine',0.12,0.18); playTone(1100,'sine',0.08,0.1,0.02,0.06); }
function sfxPuff()   { playTone(220,'sawtooth',0.15,0.08,0.02,0.12); }
function sfxHurt()   { playTone(150,'square',0.3,0.2,0.005,0.28); }
function sfxStun()   { playTone(440,'square',0.2,0.15); playTone(330,'square',0.18,0.12,0.05,0.15); }
function sfxLevelUp(){ [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.3,0.15,0.01,0.25+i*0.05)); }
function sfxStarfish(){ playTone(659,'sine',0.2,0.2); playTone(880,'sine',0.15,0.15,0.05,0.18); playTone(1047,'sine',0.1,0.12,0.1,0.15); }
function sfxCombo(n) { playTone(440+n*110,'sine',0.15,0.2+n*0.03); }

/* ═══════════════════════════════════════════
   SCREEN SHAKE
═══════════════════════════════════════════ */
let shakeTimer = 0, shakeAmt = 0;
function triggerShake(amt, dur) { shakeAmt = amt; shakeTimer = dur; }
function applyShake() {
  if (shakeTimer > 0) {
    const s = shakeAmt * (shakeTimer / 20);
    ctx.translate(rnd(-s,s), rnd(-s,s));
    shakeTimer--;
  }
}

/* ═══════════════════════════════════════════
   PARTICLE
═══════════════════════════════════════════ */
class Particle {
  constructor(x,y,opts={}) {
    this.x=x; this.y=y;
    this.vx=opts.vx??rnd(-2.5,2.5);
    this.vy=opts.vy??rnd(-3.5,-0.5);
    this.life=opts.life??rnd(30,70);
    this.maxLife=this.life;
    this.r=opts.r??rnd(2,7);
    this.color=opts.color??'#fff';
    this.gravity=opts.gravity??0.04;
    this.shape=opts.shape??'circle';
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.vy+=this.gravity; this.life--; }
  draw() {
    const a = this.life/this.maxLife;
    ctx.save(); ctx.globalAlpha = a*a;
    ctx.fillStyle = this.color;
    if (this.shape === 'star') {
      ctx.translate(this.x, this.y);
      ctx.rotate(this.life*0.1);
      starPath(ctx, 0, 0, this.r*0.4, this.r, 5);
      ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r*(0.5+a*0.5),0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  get dead() { return this.life<=0; }
}

function starPath(c,cx,cy,ir,or,pts) {
  c.beginPath();
  for (let i=0;i<pts*2;i++) {
    const a=(i/(pts*2))*Math.PI*2-Math.PI/2;
    const r2=i%2===0?or:ir;
    i===0?c.moveTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2):c.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);
  }
  c.closePath();
}

/* ═══════════════════════════════════════════
   BUBBLE
═══════════════════════════════════════════ */
class Bubble {
  constructor(x,y,r) {
    this.x=x??rnd(0,W); this.y=y??rnd(0,H);
    this.r=r??rnd(2,10);
    this.vy=rnd(-0.3,-1.1); this.vx=rnd(-0.2,0.2);
    this.alpha=rnd(0.12,0.45); this.wobble=rnd(0,Math.PI*2);
  }
  update() {
    this.wobble+=0.04; this.x+=Math.sin(this.wobble)*0.4+this.vx; this.y+=this.vy;
    if (this.y+this.r<0) { this.y=H+this.r; this.x=rnd(0,W); }
  }
  draw() {
    ctx.save(); ctx.globalAlpha=this.alpha;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(180,230,255,0.9)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath(); ctx.arc(this.x-this.r*0.3,this.y-this.r*0.3,this.r*0.22,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
    ctx.restore();
  }
}

/* ═══════════════════════════════════════════
   CORAL
═══════════════════════════════════════════ */
class Coral {
  constructor() {
    this.x=rnd(0,W); this.y=rnd(H-70,H-15);
    this.h=rnd(30,75); this.w=rnd(8,20);
    const hue=[0,20,280,330,180][rndI(0,4)];
    this.color=`hsl(${hue},90%,55%)`; this.dark=`hsl(${hue},90%,35%)`;
    this.branches=rndI(2,5); this.type=rndI(0,2);
  }
  draw() {
    ctx.save(); ctx.strokeStyle=this.color; ctx.lineWidth=this.w*0.4; ctx.lineCap='round';
    if (this.type===0) this._branch(this.x,this.y,-Math.PI/2,this.h,this.branches);
    else {
      const gr=ctx.createLinearGradient(this.x,this.y,this.x,this.y-this.h);
      gr.addColorStop(0,this.color); gr.addColorStop(1,'#fff');
      ctx.strokeStyle=gr;
      ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x+Math.sin(this.x)*8,this.y-this.h); ctx.stroke();
      ctx.beginPath(); ctx.arc(this.x+Math.sin(this.x)*8,this.y-this.h,this.w*0.55,0,Math.PI*2);
      ctx.fillStyle=this.color; ctx.fill();
    }
    ctx.restore();
  }
  _branch(x,y,angle,length,depth) {
    if (depth===0||length<5) return;
    const ex=x+Math.cos(angle)*length, ey=y+Math.sin(angle)*length;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(ex,ey); ctx.stroke();
    this._branch(ex,ey,angle-0.5,length*0.65,depth-1);
    this._branch(ex,ey,angle+0.5,length*0.65,depth-1);
  }
}

/* ═══════════════════════════════════════════
   SEAWEED
═══════════════════════════════════════════ */
class Seaweed {
  constructor() {
    this.x=rnd(0,W); this.segments=rndI(5,10); this.segH=rnd(12,20);
    this.phase=rnd(0,Math.PI*2); this.color=`hsl(${rndI(100,145)},80%,${rndI(35,55)}%)`;
  }
  draw(t) {
    ctx.save(); ctx.lineWidth=4; ctx.strokeStyle=this.color; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath();
    let cx=this.x,cy=H; ctx.moveTo(cx,cy);
    for (let i=0;i<this.segments;i++) {
      const wave=Math.sin(t*0.018+this.phase+i*0.5)*10;
      cx+=wave; cy-=this.segH; ctx.lineTo(cx,cy);
    }
    ctx.stroke(); ctx.restore();
  }
}

/* ═══════════════════════════════════════════
   SMALL FISH (collectible)
═══════════════════════════════════════════ */
class SmallFish {
  constructor(level) {
    const side=Math.random()<0.5?-1:1;
    this.x=side<0?-40:W+40; this.y=rnd(60,H-110);
    this.speed=rnd(1.2,2.5)+level*0.15;
    this.vx=side>0?-this.speed:this.speed; this.vy=0;
    this.dir=this.vx>0?1:-1; this.wobble=rnd(0,Math.PI*2);
    this.r=rnd(10,18); const hue=rndI(0,360);
    this.color=`hsl(${hue},90%,60%)`; this.fin=`hsl(${hue},90%,40%)`;
    this.points=Math.round(10+level*5); this.alive=true;
  }
  update(t) {
    this.wobble+=0.1; this.vy=Math.sin(this.wobble)*0.5;
    this.x+=this.vx; this.y+=this.vy;
    this.y=clamp(this.y,55,H-95);
    if (this.x<-70||this.x>W+70) this.alive=false;
  }
  draw() {
    if (!this.alive) return;
    ctx.save(); ctx.translate(this.x,this.y); ctx.scale(this.dir,1);
    ctx.beginPath(); ctx.ellipse(0,0,this.r*1.6,this.r*0.85,0,0,Math.PI*2);
    ctx.fillStyle=this.color; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(this.r*1.4,0); ctx.lineTo(this.r*2.2,-this.r*0.8); ctx.lineTo(this.r*2.2,this.r*0.8);
    ctx.closePath(); ctx.fillStyle=this.fin; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-this.r*0.3,-this.r*0.85); ctx.quadraticCurveTo(0,-this.r*1.6,this.r*0.6,-this.r*0.85);
    ctx.fillStyle=this.fin; ctx.fill();
    ctx.beginPath(); ctx.arc(-this.r*0.9,-this.r*0.15,this.r*0.22,0,Math.PI*2);
    ctx.fillStyle='#111'; ctx.fill();
    ctx.restore();
  }
  get hitRadius() { return this.r*1.3; }
}

/* ═══════════════════════════════════════════
   SHARK (enemy)
═══════════════════════════════════════════ */
class Shark {
  constructor(level) {
    const side=Math.random()<0.5?-1:1;
    this.x=side<0?-80:W+80; this.y=rnd(80,H-120);
    this.speed=rnd(1.0,1.8)+level*0.18;
    this.vx=side>0?-this.speed:this.speed; this.vy=0;
    this.dir=this.vx>0?1:-1; this.chaseR=220+level*20;
    this.fleeTimer=0; this.stun=0; this.biting=0;
    this.alive=true; this.len=rnd(55,80); this.dmg=15+level*5;
  }
  update(px,py,puffed) {
    if (this.stun>0){this.stun--;return;}
    if (this.fleeTimer>0) this.fleeTimer--;
    const dx=px-this.x, dy=py-this.y, d=Math.hypot(dx,dy);
    if (puffed&&d<this.chaseR) {
      const a=Math.atan2(dy,dx)+Math.PI;
      this.vx=lerp(this.vx,Math.cos(a)*this.speed*2.2,0.08);
      this.vy=lerp(this.vy,Math.sin(a)*this.speed*2.2,0.08);
      this.fleeTimer=70;
    } else if (this.fleeTimer===0&&d<this.chaseR) {
      const a=Math.atan2(dy,dx);
      this.vx=lerp(this.vx,Math.cos(a)*this.speed,0.05);
      this.vy=lerp(this.vy,Math.sin(a)*this.speed,0.05);
    } else {
      this.vy=lerp(this.vy,Math.sin(Date.now()*0.001+this.x)*0.5,0.05);
    }
    this.dir=this.vx>0?1:-1; this.x+=this.vx; this.y+=this.vy;
    this.y=clamp(this.y,60,H-80);
    if (this.x<-130||this.x>W+130) this.alive=false;
    if (this.biting>0) this.biting--;
  }
  draw() {
    const L=this.len; const flee=this.fleeTimer>0;
    ctx.save(); ctx.translate(this.x,this.y); ctx.scale(this.dir,1);
    const gr=ctx.createLinearGradient(-L*0.6,-L*0.22,L*0.6,L*0.22);
    gr.addColorStop(0,flee?'#6699bb':'#667788');
    gr.addColorStop(1,flee?'#aaccee':'#aabbcc');
    ctx.beginPath(); ctx.ellipse(0,0,L*0.55,L*0.22,0,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,L*0.08,L*0.45,L*0.12,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(L*0.5,0); ctx.lineTo(L*0.8,-L*0.25); ctx.lineTo(L*0.8,L*0.25);
    ctx.closePath(); ctx.fillStyle='#556677'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-L*0.1,-L*0.22); ctx.lineTo(L*0.1,-L*0.45); ctx.lineTo(L*0.3,-L*0.22);
    ctx.fillStyle='#556677'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-L*0.52,0); ctx.lineTo(-L*0.7,-L*0.08); ctx.lineTo(-L*0.7,L*0.08);
    ctx.closePath(); ctx.fillStyle='#667788'; ctx.fill();
    ctx.beginPath(); ctx.arc(-L*0.36,-L*0.06,L*0.055,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
    ctx.beginPath(); ctx.arc(-L*0.38,-L*0.08,L*0.02,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    if (this.stun>0) {
      for (let i=0;i<3;i++){
        const a=(Date.now()*0.01+i*2.1)%(Math.PI*2);
        ctx.fillStyle='#ffff00'; ctx.font=`${L*0.18}px serif`;
        ctx.fillText('★',Math.cos(a)*L*0.4-6,Math.sin(a)*L*0.35-L*0.4);
      }
    }
    ctx.restore();
  }
  get hitRadius() { return this.len*0.4; }
}

/* ═══════════════════════════════════════════
   ANGLERFISH (harder enemy)
═══════════════════════════════════════════ */
class Anglerfish {
  constructor(level) {
    this.x=Math.random()<0.5?-100:W+100; this.y=rnd(H*0.45,H*0.85);
    this.speed=0.8+level*0.15;
    this.vx=this.x<0?this.speed:-this.speed; this.vy=0;
    this.dir=this.vx>0?1:-1; this.alive=true; this.biting=0;
    this.size=rnd(45,65); this.lurePhase=rnd(0,Math.PI*2);
    this.dmg=25+level*8; this.stun=0; this.fleeTimer=0; this.chaseR=180+level*15;
  }
  update(px,py,puffed) {
    if (this.stun>0){this.stun--;return;}
    this.lurePhase+=0.06;
    if (this.fleeTimer>0) this.fleeTimer--;
    const dx=px-this.x,dy=py-this.y,d=Math.hypot(dx,dy);
    if (puffed&&d<this.chaseR){
      const a=Math.atan2(dy,dx)+Math.PI;
      this.vx=lerp(this.vx,Math.cos(a)*this.speed*2.5,0.07);
      this.vy=lerp(this.vy,Math.sin(a)*this.speed*2.5,0.07);
      this.fleeTimer=90;
    } else if (this.fleeTimer===0&&d<this.chaseR){
      const a=Math.atan2(dy,dx);
      this.vx=lerp(this.vx,Math.cos(a)*this.speed,0.04);
      this.vy=lerp(this.vy,Math.sin(a)*this.speed*0.6,0.04);
    } else {
      this.vy=lerp(this.vy,Math.sin(Date.now()*0.0008+this.y)*0.6,0.04);
    }
    this.dir=this.vx>0?1:-1; this.x+=this.vx; this.y+=this.vy;
    this.y=clamp(this.y,H*0.35,H-70);
    if (this.x<-160||this.x>W+160) this.alive=false;
    if (this.biting>0) this.biting--;
  }
  draw() {
    const S=this.size; const glow=Math.sin(this.lurePhase)*0.5+0.5;
    const lx=-S*0.3, ly=-S*1.1;
    ctx.save(); ctx.translate(this.x,this.y); ctx.scale(this.dir,1);
    ctx.save(); ctx.globalAlpha=0.18+glow*0.25;
    const gg=ctx.createRadialGradient(lx,ly,0,lx,ly,S*0.8);
    gg.addColorStop(0,'#88ffaa'); gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(lx,ly,S*0.8,0,Math.PI*2); ctx.fill(); ctx.restore();
    const bg=ctx.createRadialGradient(-S*0.1,-S*0.1,0,0,0,S*0.7);
    bg.addColorStop(0,'#334455'); bg.addColorStop(1,'#111822');
    ctx.beginPath(); ctx.ellipse(0,0,S*0.7,S*0.65,0,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();
    ctx.fillStyle='#223344';
    for (let i=-2;i<=2;i++){
      ctx.beginPath(); ctx.moveTo(i*S*0.15,-S*0.6); ctx.lineTo(i*S*0.15-S*0.04,-S*0.85); ctx.lineTo(i*S*0.15+S*0.04,-S*0.85); ctx.closePath(); ctx.fill();
    }
    ctx.beginPath(); ctx.moveTo(S*0.65,0); ctx.lineTo(S*1.05,-S*0.35); ctx.lineTo(S*1.05,S*0.35); ctx.closePath(); ctx.fillStyle='#223344'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-S*0.6,S*0.05); ctx.lineTo(-S*0.85,S*0.25); ctx.lineTo(-S*0.1,S*0.6); ctx.lineTo(S*0.3,S*0.55); ctx.closePath(); ctx.fillStyle='#1a2233'; ctx.fill();
    ctx.fillStyle='#eee';
    for (let i=0;i<5;i++){
      const tx=lerp(-S*0.75,-S*0.1,i/4), ty=lerp(S*0.2,S*0.5,i/4);
      ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx-S*0.04,ty+S*0.12); ctx.lineTo(tx+S*0.04,ty+S*0.12); ctx.closePath(); ctx.fill();
    }
    ctx.beginPath(); ctx.arc(-S*0.28,-S*0.15,S*0.18,0,Math.PI*2); ctx.fillStyle='#ffee00'; ctx.fill();
    ctx.beginPath(); ctx.arc(-S*0.28,-S*0.15,S*0.09,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
    ctx.strokeStyle='#446655'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-S*0.1,-S*0.6); ctx.quadraticCurveTo(-S*0.4,-S*0.85,lx,ly); ctx.stroke();
    const lb=ctx.createRadialGradient(lx,ly,0,lx,ly,S*0.15);
    lb.addColorStop(0,`rgba(200,255,180,${0.7+glow*0.3})`); lb.addColorStop(1,`rgba(50,200,100,${0.4+glow*0.3})`);
    ctx.beginPath(); ctx.arc(lx,ly,S*0.12+glow*S*0.05,0,Math.PI*2); ctx.fillStyle=lb; ctx.fill();
    if (this.stun>0) {
      ctx.fillStyle='#ffff00'; ctx.font=`${S*0.22}px serif`;
      ctx.fillText('★★',- S*0.3,-S*0.9);
    }
    ctx.restore();
  }
  get hitRadius() { return this.size*0.55; }
}

/* ═══════════════════════════════════════════
   PUFFERFISH (player)
═══════════════════════════════════════════ */
class Pufferfish {
  constructor() {
    this.x=W/2; this.y=H/2; this.vx=0; this.vy=0;
    this.puffLevel=0; this.puffEnergy=100;
    this.health=100; this.maxHealth=100;
    this.invincible=0; this.eatFlash=0; this.hurtFlash=0;
    this.trail=[]; this.baseR=24; this.speed=3.2;
    this.facing=1; this.swimPhase=0; this.alive=true;
    this._lastPuff=false;
  }
  get r() { return this.baseR+this.puffLevel*16; }
  get isPuffed() { return this.puffLevel>0.5; }

  update(keys) {
    let ax=0,ay=0;
    if (keys['ArrowLeft']||keys['a']||keys['A']) ax-=1;
    if (keys['ArrowRight']||keys['d']||keys['D']) ax+=1;
    if (keys['ArrowUp']||keys['w']||keys['W']) ay-=1;
    if (keys['ArrowDown']||keys['s']||keys['S']) ay+=1;
    if (ax!==0&&ay!==0){ax*=0.707;ay*=0.707;}
    const spd=this.speed*(this.isPuffed?0.55:1);
    this.vx=lerp(this.vx,ax*spd,0.15); this.vy=lerp(this.vy,ay*spd,0.15);
    this.x+=this.vx; this.y+=this.vy;
    this.x=clamp(this.x,this.r,W-this.r); this.y=clamp(this.y,this.r+40,H-this.r-10);
    if (Math.abs(this.vx)>0.2) this.facing=this.vx>0?1:-1;
    this.swimPhase+=0.1;
    const wantPuff=keys[' ']||keys['Space'];
    const justPuffed=wantPuff&&!this._lastPuff;
    if (wantPuff&&this.puffEnergy>0) {
      if (justPuffed) sfxPuff();
      this.puffLevel=Math.min(1,this.puffLevel+0.06);
      this.puffEnergy=Math.max(0,this.puffEnergy-0.8);
    } else {
      this.puffLevel=Math.max(0,this.puffLevel-0.04);
      if (!wantPuff) this.puffEnergy=Math.min(100,this.puffEnergy+0.3);
    }
    this._lastPuff=wantPuff;
    if (Math.abs(this.vx)+Math.abs(this.vy)>0.5)
      this.trail.push({x:this.x,y:this.y,life:14});
    this.trail=this.trail.filter(t=>--t.life>0);
    if (this.invincible>0) this.invincible--;
    if (this.eatFlash>0) this.eatFlash--;
    if (this.hurtFlash>0) this.hurtFlash--;
  }

  takeDamage(dmg) {
    if (this.invincible>0) return false;
    this.health=Math.max(0,this.health-dmg); this.invincible=90; this.hurtFlash=18;
    if (this.health<=0) this.alive=false;
    sfxHurt(); triggerShake(7,18);
    return true;
  }

  draw() {
    this.trail.forEach(t=>{
      ctx.save(); ctx.globalAlpha=t.life/14*0.2;
      ctx.beginPath(); ctx.arc(t.x,t.y,this.r*0.55,0,Math.PI*2);
      ctx.fillStyle='#66ccff'; ctx.fill(); ctx.restore();
    });
    const R=this.r;
    ctx.save(); ctx.translate(this.x,this.y); ctx.scale(this.facing,1);
    if (this.isPuffed) {
      const gr=ctx.createRadialGradient(0,0,R*0.4,0,0,R*1.8);
      gr.addColorStop(0,'rgba(255,220,80,0.22)'); gr.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(0,0,R*1.8,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
    }
    const hurt=this.hurtFlash>0, eat=this.eatFlash>0;
    const blink=this.invincible>0&&Math.floor(this.invincible/4)%2===0;
    const bg=ctx.createRadialGradient(-R*0.25,-R*0.3,0,0,0,R);
    if (hurt){bg.addColorStop(0,'#ff8888');bg.addColorStop(1,'#cc2200');}
    else if (eat){bg.addColorStop(0,'#ffff99');bg.addColorStop(1,'#ddaa00');}
    else if (blink){bg.addColorStop(0,'#ccffff');bg.addColorStop(1,'#0099cc');}
    else{bg.addColorStop(0,'#ffe566');bg.addColorStop(0.45,'#ffaa00');bg.addColorStop(1,'#cc5500');}
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();
    ctx.save(); ctx.globalAlpha=0.28; ctx.fillStyle='#aa4400';
    [[-R*0.2,R*0.3,R*0.12],[R*0.25,R*0.2,R*0.09],[-R*0.35,-R*0.2,R*0.08],[R*0.1,-R*0.35,R*0.1]].forEach(([x,y,r])=>{
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }); ctx.restore();
    const sc=this.isPuffed?16:8, sl=this.isPuffed?R*0.58:R*0.28, sw=this.isPuffed?3.5:2;
    ctx.strokeStyle='#884400'; ctx.lineWidth=sw; ctx.lineCap='round';
    for (let i=0;i<sc;i++){
      const a=(i/sc)*Math.PI*2+this.swimPhase*0.04;
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*R,Math.sin(a)*R); ctx.lineTo(Math.cos(a)*(R+sl),Math.sin(a)*(R+sl)); ctx.stroke();
    }
    const sw2=Math.sin(this.swimPhase)*0.3;
    ctx.save(); ctx.rotate(sw2);
    ctx.beginPath(); ctx.moveTo(R*0.7,0); ctx.lineTo(R*1.48,-R*0.55); ctx.lineTo(R*1.48,R*0.55);
    ctx.closePath(); ctx.fillStyle='#dd7700'; ctx.fill(); ctx.restore();
    const fw=Math.sin(this.swimPhase*1.5)*0.25;
    ctx.save(); ctx.rotate(-0.5+fw);
    ctx.beginPath(); ctx.ellipse(-R*0.18,R*0.55,R*0.45,R*0.17,Math.PI*0.3,0,Math.PI*2);
    ctx.fillStyle='#ee9900'; ctx.fill(); ctx.restore();
    ctx.beginPath(); ctx.arc(-R*0.38,-R*0.2,R*0.28,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(-R*0.34,-R*0.2,R*0.16,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
    ctx.beginPath(); ctx.arc(-R*0.3,-R*0.26,R*0.06,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    if (this.isPuffed) {
      ctx.beginPath(); ctx.arc(-R*0.65,R*0.1,R*0.12,0.1,Math.PI-0.1);
      ctx.strokeStyle='#663300'; ctx.lineWidth=2.5; ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(-R*0.68,R*0.05,R*0.1,-0.4,0.4);
      ctx.strokeStyle='#663300'; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.restore();
  }
}

/* ═══════════════════════════════════════════
   FLOATING TEXT
═══════════════════════════════════════════ */
class FloatingText {
  constructor(x,y,text,color='#fff',size=20) {
    this.x=x; this.y=y; this.text=text; this.color=color; this.size=size;
    this.life=75; this.maxLife=75; this.vy=-1.6; this.scale=1.4;
  }
  update(){this.y+=this.vy;this.vy*=0.96;this.life--;this.scale=Math.max(1,this.scale*0.92);}
  draw(){
    ctx.save(); ctx.globalAlpha=this.life/this.maxLife;
    ctx.translate(this.x,this.y); ctx.scale(this.scale,this.scale);
    ctx.font=`bold ${this.size}px 'Segoe UI',Arial`; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.lineWidth=4;
    ctx.strokeText(this.text,0,0); ctx.fillStyle=this.color; ctx.fillText(this.text,0,0);
    ctx.restore();
  }
  get dead(){return this.life<=0;}
}

/* ═══════════════════════════════════════════
   STARFISH (bonus)
═══════════════════════════════════════════ */
class Starfish {
  constructor(){
    this.x=rnd(40,W-40); this.y=rnd(H-120,H-50);
    this.r=rnd(14,22); this.alive=true; this.bob=rnd(0,Math.PI*2);
    this.rot=rnd(0,Math.PI*2); this.color=`hsl(${rndI(0,30)},90%,58%)`;
    this.pulse=rnd(0,Math.PI*2);
  }
  update(){this.bob+=0.03;this.rot+=0.01;this.pulse+=0.07;}
  draw(){
    const pr=this.r*(1+Math.sin(this.pulse)*0.08);
    ctx.save(); ctx.translate(this.x,this.y+Math.sin(this.bob)*3); ctx.rotate(this.rot);
    ctx.save(); ctx.globalAlpha=0.25;
    ctx.beginPath(); ctx.arc(0,0,pr*1.5,0,Math.PI*2);
    ctx.fillStyle=this.color; ctx.fill(); ctx.restore();
    ctx.fillStyle=this.color; starPath(ctx,0,0,pr*0.42,pr,5); ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,pr*0.22,0,Math.PI*2);
    ctx.fillStyle=`hsl(20,90%,40%)`; ctx.fill();
    ctx.restore();
  }
  get hitRadius(){return this.r*1.1;}
}

/* ═══════════════════════════════════════════
   COMBO SYSTEM
═══════════════════════════════════════════ */
let combo=0, comboTimer=0, maxCombo=0;
const COMBO_TIMEOUT=90;
function addCombo(){
  combo++; comboTimer=COMBO_TIMEOUT;
  if (combo>maxCombo) maxCombo=combo;
  if (combo>=3) sfxCombo(Math.min(combo,6));
  return combo;
}
function updateCombo(){if(comboTimer>0){comboTimer--;}else{combo=0;}}

   LEVELS

const LEVELS=[
  {sharks:1,anglerfishes:0,fishPerWave:6, fishWaveInterval:280,starfish:2,scoreTarget:200, name:'המים הרדודים',   bg0:'#001533',bg1:'#002255'},
  {sharks:2,anglerfishes:0,fishPerWave:7, fishWaveInterval:250,starfish:3,scoreTarget:450, name:'שונית האלמוגים', bg0:'#001a3a',bg1:'#003060'},
  {sharks:3,anglerfishes:1,fishPerWave:8, fishWaveInterval:220,starfish:3,scoreTarget:750, name:'הים הפתוח',      bg0:'#001230',bg1:'#002050'},
  {sharks:3,anglerfishes:2,fishPerWave:9, fishWaveInterval:200,starfish:4,scoreTarget:1100,name:'מעמקי הים',      bg0:'#000c22',bg1:'#001540'},
  {sharks:4,anglerfishes:2,fishPerWave:10,fishWaveInterval:180,starfish:4,scoreTarget:1600,name:'תהום האופל',     bg0:'#050010',bg1:'#0d0028'},

/* ═══════════════════════════════════════════
   GAME STATE GLOBALS
═══════════════════════════════════════════ */
let state, score, level, player, sharks, anglerfishes, smallFishes, starfishes,
    bubbles, corals, seaweeds, particles, floatingTexts, keys, tick,
    fishWaveTimer, highScore=0, countdownTimer, countdownVal;

function spawnParticles(x,y,n,colorFn,opts={}) {
  for (let i=0;i<n;i++) particles.push(new Particle(x,y,{color:colorFn(),...opts}));
}

function initLevel(lvl){
  level=lvl; const cfg=LEVELS[lvl];
  sharks=Array.from({length:cfg.sharks},()=>new Shark(lvl));
  anglerfishes=Array.from({length:cfg.anglerfishes},()=>new Anglerfish(lvl));
  smallFishes=Array.from({length:cfg.fishPerWave},()=>new SmallFish(lvl));
  starfishes=Array.from({length:cfg.starfish},()=>new Starfish());
  fishWaveTimer=cfg.fishWaveInterval; particles=[]; floatingTexts=[];
  combo=0; comboTimer=0;
}
function initGame(){
  state=STATES.COUNTDOWN; countdownTimer=0; countdownVal=3;
  score=0; tick=0;
  player=new Pufferfish();
  bubbles=Array.from({length:38},()=>new Bubble());
  corals=Array.from({length:18},()=>new Coral());
  seaweeds=Array.from({length:14},()=>new Seaweed());
  initLevel(0);
}
function doReset(){highScore=Math.max(highScore,score??0);state=STATES.MENU;}

/* ═══════════════════════════════════════════
   INPUT
═══════════════════════════════════════════ */
keys={};
window.addEventListener('keydown',e=>{
  keys[e.key]=true; if(e.key===' ')e.preventDefault();
  if((state===STATES.MENU)&&(e.key==='Enter'||e.key===' ')) initGame();
  if(state===STATES.DEAD&&(e.key==='Enter'||e.key===' ')) doReset();
  if(state===STATES.LEVEL_UP&&(e.key==='Enter'||e.key===' ')) nextLevel();
  if(state===STATES.WIN&&(e.key==='Enter'||e.key===' ')) doReset();
  if((e.key==='Escape'||e.key==='p'||e.key==='P')&&state===STATES.PLAYING) state=STATES.PAUSED;
  else if((e.key==='Escape'||e.key==='p'||e.key==='P')&&state===STATES.PAUSED) state=STATES.PLAYING;
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function nextLevel(){
  if(level+1<LEVELS.length){
    player.health=Math.min(player.maxHealth,player.health+30);
    player.puffEnergy=100; initLevel(level+1);
    state=STATES.COUNTDOWN; countdownTimer=0; countdownVal=3;
  } else { state=STATES.WIN; sfxLevelUp(); }
}

/* ── Mobile / Touch ── */
let touchPuff=false;
const TOUCH_PUFF_X=W*0.65;

canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); getAudio(); // Initialize Web Audio context after user gesture (required by browser autoplay policy)
  if(state!==STATES.PLAYING){
    if(state===STATES.MENU) initGame();
    else if(state===STATES.DEAD) doReset();
    else if(state===STATES.LEVEL_UP) nextLevel();
    else if(state===STATES.WIN) doReset();
    else if(state===STATES.COUNTDOWN||state===STATES.PAUSED) state=STATES.PLAYING;
    return;
  }
  Array.from(e.changedTouches).forEach(t=>{
    const bx=canvas.getBoundingClientRect();
    const tx=(t.clientX-bx.left)*(W/bx.width);
    if(tx>TOUCH_PUFF_X) touchPuff=true;
  });
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault(); if(state!==STATES.PLAYING)return;
  Array.from(e.changedTouches).forEach(t=>{
    const bx=canvas.getBoundingClientRect();
    const tx=(t.clientX-bx.left)*(W/bx.width);
    const ty=(t.clientY-bx.top)*(H/bx.height);
    if(tx<=TOUCH_PUFF_X){
      const dx=tx-player.x,dy=ty-player.y,len=Math.hypot(dx,dy);
      if(len>15){keys['_tx']=dx/len;keys['_ty']=dy/len;}
    }
  });
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault(); touchPuff=false;
  keys['_tx']=0;keys['_ty']=0;
},{passive:false});

/* ═══════════════════════════════════════════
   BACKGROUND
═══════════════════════════════════════════ */
function drawBackground(){
  const cfg=LEVELS[level]||LEVELS[0];
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,cfg.bg0); bg.addColorStop(0.5,cfg.bg1); bg.addColorStop(1,'#000a18');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // caustic rays
  ctx.save(); ctx.globalAlpha=0.04+Math.sin(tick*0.007)*0.012;
  for(let i=0;i<8;i++){
    const rx=(i/8)*W+Math.sin(tick*0.005+i)*28;
    const rg=ctx.createLinearGradient(rx,0,rx+25,H*0.65);
    rg.addColorStop(0,'rgba(100,200,255,0.9)'); rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg; ctx.beginPath();
    ctx.moveTo(rx-14,0);ctx.lineTo(rx+14,0);ctx.lineTo(rx+42,H*0.65);ctx.lineTo(rx-14,H*0.65);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
  // sandy bottom
  const sand=ctx.createLinearGradient(0,H-55,0,H);
  sand.addColorStop(0,'#1a3a0a');sand.addColorStop(0.3,'#2a5a1a');sand.addColorStop(1,'#0e1e06');
  ctx.fillStyle=sand; ctx.fillRect(0,H-55,W,55);
  ctx.save(); ctx.globalAlpha=0.14; ctx.strokeStyle='#4a7a2a'; ctx.lineWidth=1.5;
  for(let i=0;i<13;i++){
    const rx=(i/12)*W;
    ctx.beginPath(); ctx.moveTo(rx,H-50); ctx.quadraticCurveTo(rx+28,H-42,rx+56,H-50); ctx.stroke();
  }
  ctx.restore();
}

/* ═══════════════════════════════════════════
   OFF-SCREEN ENEMY ARROWS
═══════════════════════════════════════════ */
function drawEnemyArrows(){
  const enemies=[...sharks,...anglerfishes];
  enemies.forEach(e=>{
    if(!e.alive) return;
    if(e.x>0&&e.x<W&&e.y>40&&e.y<H) return;
    const dx=e.x-W/2, dy=e.y-H/2;
    const ang=Math.atan2(dy,dx);
    const margin=30;
    const ax=clamp(W/2+Math.cos(ang)*350,margin,W-margin);
    const ay=clamp(H/2+Math.sin(ang)*250,margin+40,H-margin);
    ctx.save(); ctx.translate(ax,ay); ctx.rotate(ang);
    ctx.globalAlpha=0.75+Math.sin(tick*0.1)*0.25;
    ctx.fillStyle=e instanceof Anglerfish?'#ff4400':'#ff2244';
    ctx.beginPath(); ctx.moveTo(16,0); ctx.lineTo(-10,-9); ctx.lineTo(-6,0); ctx.lineTo(-10,9); ctx.closePath(); ctx.fill();
    ctx.restore();
  });
}

/* ═══════════════════════════════════════════
   HUD
═══════════════════════════════════════════ */
function drawBar(x,y,w,h,pct,col1,col2,bg='rgba(0,0,0,0.5)',radius=6){
  ctx.fillStyle=bg; roundRect(ctx,x,y,w,h,radius); ctx.fill();
  if(pct>0){
    const gr=ctx.createLinearGradient(x,y,x+w*pct,y);
    gr.addColorStop(0,col1); gr.addColorStop(1,col2);
    ctx.fillStyle=gr; roundRect(ctx,x+2,y+2,(w-4)*pct,h-4,radius-2); ctx.fill();
  }
}
function drawHUD(){
  const cfg=LEVELS[level];
  const PAD=14;

  // ── HP ──
  drawBar(PAD,PAD,200,24,player.health/100,
    player.health>60?'#33ee66':player.health>30?'#ffcc00':'#ff3333',
    'rgba(255,255,255,0.35)');
  ctx.fillStyle='#fff'; ctx.font='bold 11px Arial'; ctx.textAlign='left';
  ctx.fillText('❤️  חיים',PAD+6,PAD+16);

  // ── Energy ──
  drawBar(PAD,PAD+30,200,18,player.puffEnergy/100,'#3399ff','#aaddff');
  ctx.fillStyle='#aaddff'; ctx.font='10px Arial'; ctx.fillText('💨 אנרגיה',PAD+6,PAD+43);

  // ── Score panel ──
  ctx.fillStyle='rgba(0,0,0,0.45)'; roundRect(ctx,W-200,PAD,186,28,8); ctx.fill();
  ctx.fillStyle='#ffd700'; ctx.font='bold 16px Arial'; ctx.textAlign='right';
  ctx.fillText(`★  ${score}`,W-PAD,PAD+20);

  // ── Level progress bar ──
  const prog=Math.min(1,score/cfg.scoreTarget);
  drawBar(PAD,PAD+55,200,14,prog,'#44aaff','#88ddff','rgba(0,0,0,0.4)',5);
  ctx.fillStyle='#88ccff'; ctx.font='10px Arial'; ctx.textAlign='left';
  ctx.fillText(`שלב ${level+1} – ${cfg.name}`,PAD+4,PAD+67);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.textAlign='right';
  ctx.fillText(`${Math.round(score)}/${cfg.scoreTarget}`,PAD+196,PAD+67);

  // ── Combo ──
  if(combo>=2&&comboTimer>0){
    const alpha=Math.min(1,comboTimer/20);
    const sz=16+combo*2;
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,0,0,0.5)'; roundRect(ctx,W/2-70,PAD,140,32,10); ctx.fill();
    ctx.fillStyle=combo>=5?'#ff8800':combo>=3?'#ffee00':'#ffffff';

    ctx.fillText(`🔥 combo ×${combo}!`,W/2,PAD+22); ctx.restore();
  }

  // ── Puffed banner ──
  if(player.isPuffed){
    ctx.save(); ctx.globalAlpha=0.9;
    const bw=240, bx=W/2-bw/2;
    ctx.fillStyle='rgba(0,0,0,0.45)'; roundRect(ctx,bx,PAD+72,bw,24,8); ctx.fill();
    ctx.fillStyle='#ffcc00'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
    ctx.fillText('💥 מנופח! אויבים בורחים!',W/2,PAD+88); ctx.restore();
  }

  // ── Mobile puff button area hint ──
  ctx.save(); ctx.globalAlpha=0.18;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(TOUCH_PUFF_X,H-55); ctx.lineTo(TOUCH_PUFF_X,H);
  ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='10px Arial'; ctx.textAlign='center';
  ctx.fillText('PUFF',W-100,H-8); ctx.fillText('MOVE',TOUCH_PUFF_X/2,H-8);
  ctx.restore();
}

/* ═══════════════════════════════════════════
   GAME UPDATE
═══════════════════════════════════════════ */
function updateGame(){
  // inject touch movement
  if(keys['_tx']||keys['_ty']){
    const tx=keys['_tx']||0,ty=keys['_ty']||0;
    keys['ArrowRight']=tx>0.3; keys['ArrowLeft']=tx<-0.3;
    keys['ArrowDown']=ty>0.3; keys['ArrowUp']=ty<-0.3;
    if(touchPuff) keys[' ']=true;
  }

  player.update(keys);
  updateCombo();

  // fish waves
  if(--fishWaveTimer<=0){
    const cfg=LEVELS[level]; fishWaveTimer=cfg.fishWaveInterval;
    for(let i=0;i<3;i++) smallFishes.push(new SmallFish(level));
  }
  // respawn enemies gradually
  if(tick%600===0&&sharks.length<LEVELS[level].sharks+2) sharks.push(new Shark(level));
  if(tick%900===0&&LEVELS[level].anglerfishes>0&&anglerfishes.length<LEVELS[level].anglerfishes+1) anglerfishes.push(new Anglerfish(level));

  sharks.forEach(s=>s.update(player.x,player.y,player.isPuffed));
  anglerfishes.forEach(a=>a.update(player.x,player.y,player.isPuffed));
  bubbles.forEach(b=>b.update());
  starfishes.forEach(sf=>sf.update());
  smallFishes.forEach(f=>f.update(tick));
  particles.forEach(p=>p.update());
  floatingTexts.forEach(ft=>ft.update());
  particles=particles.filter(p=>!p.dead);
  floatingTexts=floatingTexts.filter(ft=>!ft.dead);

  // eat small fish
  smallFishes.forEach(f=>{
    if(!f.alive)return;
    if(dist(player,f)<player.r+f.hitRadius){
      f.alive=false;
      const c=addCombo();
      const pts=f.points*Math.max(1,c>=5?4:c>=3?3:c>=2?2:1);
      score+=pts; player.eatFlash=10; sfxEat();
      spawnParticles(f.x,f.y,8,()=>f.color,{r:rnd(3,7),life:rnd(20,40)});
      const txt=c>=2?`+${pts} x${c}!`:`+${pts}`;
      floatingTexts.push(new FloatingText(f.x,f.y-20,txt,c>=3?'#ff8800':c>=2?'#ffee00':'#ffd700',18));
    }
  });
  smallFishes=smallFishes.filter(f=>f.alive);

  // eat starfish
  starfishes.forEach(sf=>{
    if(!sf.alive)return;
    if(dist(player,sf)<player.r+sf.hitRadius){
      sf.alive=false;
      const bonus=50+level*20; score+=bonus;
      player.puffEnergy=Math.min(100,player.puffEnergy+25); player.eatFlash=16; sfxStarfish();
      spawnParticles(sf.x,sf.y,14,()=>sf.color,{r:rnd(4,9),life:rnd(25,50),shape:'star'});
      floatingTexts.push(new FloatingText(sf.x,sf.y-30,`+${bonus} ⭐`,'#ff8800',22));
    }
  });
  starfishes=starfishes.filter(sf=>sf.alive);
  if(tick%420===0&&starfishes.length<LEVELS[level].starfish) starfishes.push(new Starfish());

  // shark collision
  sharks.forEach(s=>{
    if(!s.alive)return;
    if(dist(player,s)<player.r+s.hitRadius){
      if(player.isPuffed&&s.stun===0){
        s.stun=120; s.fleeTimer=200; sfxStun();
        const b=30+level*10; score+=b;
        spawnParticles(s.x,s.y,10,()=>'#ffaa00',{r:rnd(4,8),life:rnd(20,40)});
        floatingTexts.push(new FloatingText(s.x,s.y-30,`💥 +${b}`,'#ff8800',20));
      } else if(!player.isPuffed){
        if(player.takeDamage(s.dmg)){
          s.biting=20;
          spawnParticles(player.x,player.y,8,()=>'#ff2222',{r:rnd(3,6),life:rnd(15,30)});
          floatingTexts.push(new FloatingText(player.x,player.y-40,`-${s.dmg}❤️`,'#ff4444',18));
        }
      }
    }
  });

  // anglerfish collision
  anglerfishes.forEach(a=>{
    if(!a.alive)return;
    if(dist(player,a)<player.r+a.hitRadius){
      if(player.isPuffed&&a.stun===0){
        a.stun=150; a.fleeTimer=220; sfxStun();
        const b=60+level*15; score+=b;
        spawnParticles(a.x,a.y,14,()=>'#44ffaa',{r:rnd(5,10),life:rnd(25,50)});
        floatingTexts.push(new FloatingText(a.x,a.y-40,`⚡ +${b}`,'#44ffaa',22));
      } else if(!player.isPuffed){
        if(player.takeDamage(a.dmg)){
          a.biting=25;
          spawnParticles(player.x,player.y,10,()=>'#ff1111',{r:rnd(4,8),life:rnd(18,35)});
          floatingTexts.push(new FloatingText(player.x,player.y-50,`-${a.dmg}❤️`,'#ff3333',20));
        }
      }
    }
  });

  sharks=sharks.filter(s=>s.alive);
  anglerfishes=anglerfishes.filter(a=>a.alive);

  if(!player.alive){
    state=STATES.DEAD; highScore=Math.max(highScore,score);
    spawnParticles(player.x,player.y,30,()=>['#ffaa00','#ff5500','#ff0000','#ffff00'][rndI(0,3)],{r:rnd(5,14),life:rnd(40,80),gravity:0.1});
    return;
  }
  if(score>=LEVELS[level].scoreTarget){ state=STATES.LEVEL_UP; sfxLevelUp(); }
}

/* ═══════════════════════════════════════════
   DRAW GAME
═══════════════════════════════════════════ */
function drawGame(){
  ctx.save(); applyShake();
  drawBackground();
  seaweeds.forEach(sw=>sw.draw(tick));
  corals.forEach(c=>c.draw());
  bubbles.forEach(b=>b.draw());
  starfishes.forEach(sf=>sf.draw());
  smallFishes.forEach(f=>f.draw());
  sharks.forEach(s=>s.draw());
  anglerfishes.forEach(a=>a.draw());
  particles.forEach(p=>p.draw());
  player.draw();
  floatingTexts.forEach(ft=>ft.draw());
  drawEnemyArrows();
  drawHUD();
  ctx.restore();
}

/* ═══════════════════════════════════════════
   SCREEN: MENU
═══════════════════════════════════════════ */
function drawMenu(){
  drawBackground();
  bubbles.forEach(b=>{b.update();b.draw();});
  // Panel
  ctx.save();
  ctx.fillStyle='rgba(0,8,35,0.82)'; roundRect(ctx,W/2-270,55,540,475,22); ctx.fill();
  ctx.strokeStyle='rgba(80,180,255,0.4)'; ctx.lineWidth=2;
  roundRect(ctx,W/2-270,55,540,475,22); ctx.stroke();
  // Animated pufferfish
  const bob=Math.sin(tick*0.04)*6;
  const R=56; const t2=tick*0.025;
  ctx.save(); ctx.translate(W/2,160+bob);
  const glr=ctx.createRadialGradient(0,0,R*0.4,0,0,R*2);
  glr.addColorStop(0,'rgba(255,220,80,0.3)'); glr.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(0,0,R*2,0,Math.PI*2); ctx.fillStyle=glr; ctx.fill();
  const bg2=ctx.createRadialGradient(-R*0.25,-R*0.3,0,0,0,R);
  bg2.addColorStop(0,'#ffe566'); bg2.addColorStop(0.45,'#ffaa00'); bg2.addColorStop(1,'#cc5500');
  ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.fillStyle=bg2; ctx.fill();
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2+t2; ctx.strokeStyle='#884400'; ctx.lineWidth=2.8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*R,Math.sin(a)*R); ctx.lineTo(Math.cos(a)*(R+24),Math.sin(a)*(R+24)); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(-R*0.4,-R*0.2,R*0.28,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.beginPath(); ctx.arc(-R*0.36,-R*0.2,R*0.16,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.arc(-R*0.31,-R*0.26,R*0.06,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();
  // Title
  ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.lineWidth=5;
  ctx.font='bold 46px Arial';
  ctx.strokeText('🐡 דג הנגיל',W/2,232); ctx.fillStyle='#ffd700'; ctx.fillText('🐡 דג הנגיל',W/2,232);
  ctx.font='19px Arial'; ctx.fillStyle='#88ccff'; ctx.fillText('הרפתקה תת-ימית',W/2,260);
  // Instructions
  const rows=[
    ['⬆⬇⬅➡','תזוז במים'],['SPACE / רווח','התנפח! – אויבים בורחים'],
    ['🐟','אכול דגים קטנים לניקוד'],['⭐','אסוף כוכבי ים לבונוס ואנרגיה'],
    ['🔥','אכול מהר – קבל combo!'],
  ];
  ctx.font='15px Arial'; ctx.fillStyle='#cceeff';
  rows.forEach(([key,desc],i)=>{
    const y=303+i*30;
    ctx.fillStyle='rgba(80,160,255,0.25)'; roundRect(ctx,W/2-230,y-17,460,24,6); ctx.fill();
    ctx.fillStyle='#ffdd88'; ctx.textAlign='right'; ctx.fillText(key,W/2-15,y);
    ctx.fillStyle='#cceeff'; ctx.textAlign='left'; ctx.fillText('– '+desc,W/2-5,y);
  });
  // Start prompt
  if(Math.floor(tick/30)%2===0){
    ctx.fillStyle='#fff'; ctx.font='bold 21px Arial'; ctx.textAlign='center';
    ctx.fillText('לחץ ENTER / רווח להתחלה',W/2,458);
  }
  if(highScore>0){
    ctx.fillStyle='#ffd700'; ctx.font='14px Arial';
    ctx.fillText(`🏆 שיא: ${highScore}`,W/2,488);
  }
  ctx.restore();
}

/* ═══════════════════════════════════════════
   SCREEN: COUNTDOWN
═══════════════════════════════════════════ */
function drawCountdown(){
  drawGame();
  const alpha=0.7;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(0,10,40,0.65)'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
  const t=countdownVal>0?countdownVal:'!';
  const scale=1+(countdownTimer%60)/60*0.5;
  ctx.textAlign='center';
  ctx.font=`bold ${80*scale}px Arial`;
  ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=8;
  ctx.strokeText(t+'',W/2,H/2+25);
  ctx.fillStyle=countdownVal>0?'#ffff66':'#44ff88';
  ctx.fillText(t+'',W/2,H/2+25);
  ctx.font='bold 22px Arial'; ctx.fillStyle='#88ccff';
  ctx.fillText(`שלב ${level+1} – ${LEVELS[level].name}`,W/2,H/2-60);
  ctx.restore();
}

/* ═══════════════════════════════════════════
   SCREEN: PAUSED
═══════════════════════════════════════════ */
function drawPaused(){
  ctx.save(); ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,12,50,0.9)'; roundRect(ctx,W/2-200,H/2-80,400,160,18); ctx.fill();
  ctx.strokeStyle='rgba(80,180,255,0.5)'; ctx.lineWidth=2;
  roundRect(ctx,W/2-200,H/2-80,400,160,18); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 38px Arial'; ctx.textAlign='center';
  ctx.fillText('⏸ הפסקה',W/2,H/2-10);
  ctx.font='18px Arial'; ctx.fillStyle='#88ccff';
  ctx.fillText('לחץ P / ESC להמשך',W/2,H/2+35);
  ctx.restore();
}

/* ═══════════════════════════════════════════
   SCREEN: DEAD
═══════════════════════════════════════════ */
function drawDead(){
  ctx.save(); ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(50,0,0,0.88)'; roundRect(ctx,W/2-220,H/2-145,440,290,22); ctx.fill();
  ctx.strokeStyle='#ff4444'; ctx.lineWidth=2; roundRect(ctx,W/2-220,H/2-145,440,290,22); ctx.stroke();
  ctx.textAlign='center';
  ctx.font='bold 50px Arial'; ctx.fillStyle='#ff4444'; ctx.fillText('💀 נפלת!',W/2,H/2-75);
  ctx.font='bold 26px Arial'; ctx.fillStyle='#ffd700'; ctx.fillText(`ניקוד: ${score}`,W/2,H/2-28);
  if(maxCombo>1){ctx.font='16px Arial';ctx.fillStyle='#ff9900';ctx.fillText(`🔥 קומבו מקסימלי: x${maxCombo}`,W/2,H/2+8);}
  if(highScore>score){ctx.fillStyle='#aaa';ctx.font='15px Arial';ctx.fillText(`שיא: ${highScore}`,W/2,H/2+34);}
  else if(score>0){ctx.fillStyle='#ffd700';ctx.font='bold 18px Arial';ctx.fillText('🏆 שיא חדש!',W/2,H/2+34);}
  if(Math.floor(tick/30)%2===0){ctx.fillStyle='#fff';ctx.font='bold 19px Arial';ctx.fillText('לחץ ENTER לתפריט',W/2,H/2+90);}
  ctx.restore();
}

/* ═══════════════════════════════════════════
   SCREEN: LEVEL UP
═══════════════════════════════════════════ */
function drawLevelUp(){
  ctx.save(); ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,25,65,0.9)'; roundRect(ctx,W/2-230,H/2-120,460,240,22); ctx.fill();
  ctx.strokeStyle='#44aaff'; ctx.lineWidth=2; roundRect(ctx,W/2-230,H/2-120,460,240,22); ctx.stroke();
  const sparkA=Math.abs(Math.sin(tick*0.1));
  ctx.fillStyle=`rgba(80,180,255,${sparkA*0.12})`; roundRect(ctx,W/2-230,H/2-120,460,240,22); ctx.fill();
  ctx.textAlign='center';
  ctx.font='bold 40px Arial'; ctx.fillStyle='#44ff88'; ctx.fillText('✨ עלית שלב!',W/2,H/2-55);
  const nxt=level+1;
  if(nxt<LEVELS.length){
    ctx.font='22px Arial'; ctx.fillStyle='#88ccff'; ctx.fillText(`שלב ${nxt+1}: ${LEVELS[nxt].name}`,W/2,H/2-8);
  }
  ctx.font='16px Arial'; ctx.fillStyle='#aaffaa'; ctx.fillText('+30 חיים!',W/2,H/2+28);
  if(Math.floor(tick/30)%2===0){ctx.fillStyle='#fff';ctx.font='bold 18px Arial';ctx.fillText('לחץ ENTER להמשך',W/2,H/2+78);}
  ctx.restore();
}

/* ═══════════════════════════════════════════
   SCREEN: WIN
═══════════════════════════════════════════ */
function drawWin(){
  ctx.save(); ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(5,35,0,0.92)'; roundRect(ctx,W/2-255,H/2-160,510,320,24); ctx.fill();
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=3; roundRect(ctx,W/2-255,H/2-160,510,320,24); ctx.stroke();
  ctx.textAlign='center';
  ctx.font='bold 50px Arial'; ctx.fillStyle='#ffd700'; ctx.fillText('🏆 ניצחת!',W/2,H/2-90);
  ctx.font='22px Arial'; ctx.fillStyle='#fff'; ctx.fillText('כיבשת את כל המעמקים!',W/2,H/2-42);
  ctx.font='bold 30px Arial'; ctx.fillStyle='#ffd700'; ctx.fillText(`ניקוד: ${score}`,W/2,H/2+8);
  if(maxCombo>1){ctx.font='16px Arial';ctx.fillStyle='#ff9900';ctx.fillText(`🔥 קומבו מקסימלי: x${maxCombo}`,W/2,H/2+42);}
  ctx.font='15px Arial'; ctx.fillStyle='#aaffaa'; ctx.fillText('אתה הדג הנגיל הגדול ביותר בים!',W/2,H/2+70);
  if(Math.floor(tick/30)%2===0){ctx.fillStyle='#fff';ctx.font='bold 18px Arial';ctx.fillText('לחץ ENTER לתפריט',W/2,H/2+120);}
  ctx.restore();
}

/* ═══════════════════════════════════════════
   COUNTDOWN LOGIC
═══════════════════════════════════════════ */
function updateCountdown(){
  countdownTimer++;
  if(countdownTimer%70===0){
    countdownVal--;
    if(countdownVal<0){ state=STATES.PLAYING; }
  }
}

/* ═══════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════ */
// init menu state
bubbles=Array.from({length:32},()=>new Bubble());
corals=Array.from({length:18},()=>new Coral());
seaweeds=Array.from({length:14},()=>new Seaweed());
particles=[]; floatingTexts=[];
level=0; tick=0;
state=STATES.MENU;

function loop(){
  requestAnimationFrame(loop);
  tick++;
  switch(state){
    case STATES.MENU:      drawMenu(); break;
    case STATES.COUNTDOWN: updateCountdown(); drawCountdown(); break;
    case STATES.PLAYING:   updateGame(); drawGame(); break;
    case STATES.PAUSED:    drawGame(); drawPaused(); break;
    case STATES.DEAD:      drawGame(); drawDead(); break;
    case STATES.LEVEL_UP:  drawGame(); drawLevelUp(); break;
    case STATES.WIN:       drawGame(); drawWin(); break;
  }
}
loop();
</script>
