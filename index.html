<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Puffer Fish Game</title>
<style>
body{
  margin:0;
  background:#001d3d;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
canvas{
  border-radius:16px;
  box-shadow:0 0 40px rgba(0,150,255,0.6);
}
</style>
</head>

<body>
<canvas id="c" width="900" height="600"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

const rnd=(a,b)=>Math.random()*(b-a)+a;

// 🌊 bubbles
let bubbles=[];

function spawnBubble(x,y){
  bubbles.push({x,y,r:3,life:60});
}

// 🐡 PLAYER
class Player{
  constructor(){
    this.x=450;
    this.y=300;
    this.r=20;
    this.energy=100;
    this.t=0;
  }

  update(){
    this.t+=0.1;

    let speed=3;

    if(keys["a"]||keys["ArrowLeft"]) this.x-=speed;
    if(keys["d"]||keys["ArrowRight"]) this.x+=speed;
    if(keys["w"]||keys["ArrowUp"]) this.y-=speed;
    if(keys["s"]||keys["ArrowDown"]) this.y+=speed;

    spawnBubble(this.x-10,this.y);
  }

  draw(){
    let tailWave=Math.sin(this.t)*5;

    // גוף
    ctx.fillStyle="#ffb703";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();

    // קוצים
    for(let i=0;i<16;i++){
      let a=i*(Math.PI*2/16);
      ctx.beginPath();
      ctx.moveTo(this.x,this.y);
      ctx.lineTo(this.x+Math.cos(a)*(this.r+8),this.y+Math.sin(a)*(this.r+8));
      ctx.strokeStyle="#fb8500";
      ctx.stroke();
    }

    // עין
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(this.x+6,this.y-4,4,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(this.x+7,this.y-4,2,0,Math.PI*2);
    ctx.fill();

    // זנב (אנימציה!)
    ctx.fillStyle="#fb8500";
    ctx.beginPath();
    ctx.moveTo(this.x-this.r,this.y);
    ctx.lineTo(this.x-this.r-12,this.y+tailWave);
    ctx.lineTo(this.x-this.r-12,this.y-tailWave);
    ctx.fill();
  }
}

// 🐟 FISH
class Fish{
  constructor(){
    this.x=rnd(0,900);
    this.y=rnd(0,600);
    this.speed=rnd(1,2);
  }

  update(){
    this.x+=this.speed;
    if(this.x>920)this.x=-20;
  }

  draw(){
    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.ellipse(this.x,this.y,10,6,0,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(this.x-10,this.y);
    ctx.lineTo(this.x-18,this.y-6);
    ctx.lineTo(this.x-18,this.y+6);
    ctx.fill();
  }
}

// 🦈 CHASING SHARK
class Shark{
  constructor(){
    this.x=rnd(0,900);
    this.y=rnd(0,600);
    this.speed=1.5;
  }

  update(){
    let dx=player.x-this.x;
    let dy=player.y-this.y;
    let d=Math.hypot(dx,dy);

    this.x+=dx/d*this.speed;
    this.y+=dy/d*this.speed;
  }

  draw(){
    ctx.fillStyle="gray";
    ctx.beginPath();
    ctx.ellipse(this.x,this.y,30,15,0,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(this.x,this.y-15);
    ctx.lineTo(this.x+10,this.y-35);
    ctx.lineTo(this.x+20,this.y-15);
    ctx.fill();
  }
}

let player=new Player();
let fishes=Array.from({length:10},()=>new Fish());
let sharks=Array.from({length:3},()=>new Shark());

function drawBackground(){
  let g=ctx.createLinearGradient(0,0,0,600);
  g.addColorStop(0,"#003566");
  g.addColorStop(1,"#001d3d");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,900,600);
}

function updateBubbles(){
  bubbles.forEach(b=>{
    b.y-=1;
    b.life--;
  });
  bubbles=bubbles.filter(b=>b.life>0);
}

function drawBubbles(){
  ctx.fillStyle="rgba(200,240,255,0.6)";
  bubbles.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
  });
}

function loop(){
  drawBackground();

  updateBubbles();
  drawBubbles();

  player.update();
  player.draw();

  fishes.forEach(f=>{
    f.update();
    f.draw();

    if(Math.hypot(player.x-f.x,player.y-f.y)<20){
      f.x=rnd(0,900);
      f.y=rnd(0,600);
    }
  });

  sharks.forEach(s=>{
    s.update();
    s.draw();

    if(Math.hypot(player.x-s.x,player.y-s.y)<35){
      alert("💀 Game Over");
      location.reload();
    }
  });

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
