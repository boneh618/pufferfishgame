<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🐡 דג הבלון</title>

<style>
body{
  margin:0;
  background:#000814;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

#wrapper{
  position:relative;
}

canvas{
  border-radius:16px;
  box-shadow:0 0 40px rgba(0,150,255,0.5);
}

#menu{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

#menu h1{
  font-size:40px;
}

#menu p{
  max-width:600px;
  line-height:1.6;
  margin:10px 0;
}

button{
  padding:12px 20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#00aaff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>
<div id="wrapper">
<canvas id="game" width="900" height="600"></canvas>

<div id="menu">
  <h1>🐡 דג הבלון</h1>

  <p>
  🎯 המטרה: לאכול דגים קטנים ולהשיג נקודות  
  </p>

  <p>
  ⚠️ להימנע מאויבים: כרישים 🦈, דגי פנס 🎣 ולווייתנים 🐋  
  </p>

  <p>
  💨 לחץ SPACE כדי להתנפח  
  בזמן התנפחות אתה מוציא רעל שפוגע באויבים  
  אבל אתה זז לאט יותר!
  </p>

  <p>
  🕹️ תזוזה: WASD / חצים  
  </p>

  <button onclick="startGame()">התחל</button>
</div>

</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let gameRunning=false;

const rnd=(a,b)=>Math.random()*(b-a)+a;

class Player{
  constructor(){
    this.x=450;
    this.y=300;
    this.r=20;
    this.speed=3;
    this.energy=100;
    this.puffed=false;
    this.poison=[];
  }

  update(){
    if(keys["ArrowLeft"]||keys["a"]) this.x-=this.speed;
    if(keys["ArrowRight"]||keys["d"]) this.x+=this.speed;
    if(keys["ArrowUp"]||keys["w"]) this.y-=this.speed;
    if(keys["ArrowDown"]||keys["s"]) this.y+=this.speed;

    this.puffed=keys[" "];

    if(this.puffed){
      this.energy-=0.5;
      if(Math.random()<0.3){
        this.poison.push({
          x:this.x,
          y:this.y,
          r:10,
          life:40
        });
      }
    }else{
      this.energy=Math.min(100,this.energy+0.3);
    }

    this.poison.forEach(p=>{
      p.life--;
      p.r+=0.3;
    });
    this.poison=this.poison.filter(p=>p.life>0);
  }

  draw(){
    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r+(this.puffed?10:0),0,Math.PI*2);
    ctx.fill();

    this.poison.forEach(p=>{
      ctx.globalAlpha=p.life/40;
      ctx.fillStyle="lime";
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    });
  }
}

class Fish{
  constructor(){
    this.x=rnd(0,900);
    this.y=rnd(0,600);
    this.r=10;
  }
  draw(){
    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();
  }
}

class Shark{
  constructor(){
    this.x=rnd(0,900);
    this.y=rnd(0,600);
    this.r=25;
  }
  draw(){
    ctx.fillStyle="gray";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();
  }
}

class Whale{
  constructor(){
    this.x=rnd(0,900);
    this.y=rnd(0,600);
    this.r=50;
  }
  draw(){
    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();
  }
}

let player;
let fishes=[];
let sharks=[];
let whales=[];
let score=0;

function startGame(){
  document.getElementById("menu").style.display="none";
  gameRunning=true;

  player=new Player();
  fishes=Array.from({length:10},()=>new Fish());
  sharks=Array.from({length:3},()=>new Shark());
  whales=Array.from({length:1},()=>new Whale());

  loop();
}

function loop(){
  if(!gameRunning)return;

  ctx.clearRect(0,0,900,600);

  player.update();
  player.draw();

  fishes.forEach(f=>{
    f.draw();
    if(Math.hypot(player.x-f.x,player.y-f.y)<20){
      score+=10;
      f.x=rnd(0,900);
      f.y=rnd(0,600);
    }
  });

  sharks.forEach(s=>{
    s.draw();
    if(Math.hypot(player.x-s.x,player.y-s.y)<40){
      alert("הפסדת!");
      location.reload();
    }
  });

  whales.forEach(w=>{
    w.draw();
    if(Math.hypot(player.x-w.x,player.y-w.y)<60){
      alert("לווייתן פגע בך!");
      location.reload();
    }
  });

  ctx.fillStyle="white";
  ctx.fillText("Score: "+score,20,20);

  requestAnimationFrame(loop);
}

let keys={};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

</script>
</body>
</html>
