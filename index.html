<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🐡 דג הבלון</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#001d3d;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

#gameCanvas{
  display:none;
  border-radius:16px;
  box-shadow:0 0 40px rgba(0,150,255,0.6);
}

.screen{
  text-align:center;
}

button{
  padding:12px 20px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#00b4d8;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🏠 LOBBY -->
<div id="lobby" class="screen">
  <h1>🐡 דג הבלון</h1>
  <p>💰 מטבעות: <span id="coins">0</span></p>

  <button onclick="startGame()">▶ שחק</button>
  <button onclick="openShop()">🛒 חנות</button>
</div>

<!-- 🛒 SHOP -->
<div id="shop" class="screen" style="display:none;">
  <h2>🛒 חנות סקינים</h2>

  <button onclick="buySkin('orange',0)">רגיל (חינם)</button><br>
  <button onclick="buySkin('red',50)">אדום - 50</button><br>
  <button onclick="buySkin('green',100)">ירוק - 100</button><br>

  <button onclick="backLobby()">⬅ חזור</button>
</div>

<!-- 🎮 GAME -->
<canvas id="gameCanvas" width="900" height="600"></canvas>

<script>
let canvas=document.getElementById("gameCanvas");
let ctx=canvas.getContext("2d");

let coins=0;
let currentSkin="orange";

function updateCoins(){
  document.getElementById("coins").innerText=coins;
}

// 🏠 NAVIGATION
function startGame(){
  document.getElementById("lobby").style.display="none";
  canvas.style.display="block";
  initGame();
}

function openShop(){
  document.getElementById("lobby").style.display="none";
  document.getElementById("shop").style.display="block";
}

function backLobby(){
  document.getElementById("shop").style.display="none";
  document.getElementById("lobby").style.display="block";
  updateCoins();
}

// 🛒 SHOP
function buySkin(color,price){
  if(coins>=price){
    coins-=price;
    currentSkin=color;
    alert("קנית סקין!");
    updateCoins();
  }else{
    alert("אין מספיק כסף!");
  }
}

// 🎮 GAME LOGIC
let player;
let fishes=[];
let sharks=[];

class Player{
  constructor(){
    this.x=450;
    this.y=300;
    this.t=0;
  }

  update(){
    this.t+=0.1;

    let speed=3;

    if(keys["a"]||keys["ArrowLeft"]) this.x-=speed;
    if(keys["d"]||keys["ArrowRight"]) this.x+=speed;
    if(keys["w"]||keys["ArrowUp"]) this.y-=speed;
    if(keys["s"]||keys["ArrowDown"]) this.y+=speed;
  }

  draw(){
    let tail=Math.sin(this.t)*5;

    ctx.fillStyle=currentSkin;

    ctx.beginPath();
    ctx.arc(this.x,this.y,20,0,Math.PI*2);
    ctx.fill();

    // tail
    ctx.beginPath();
    ctx.moveTo(this.x-20,this.y);
    ctx.lineTo(this.x-30,this.y+tail);
    ctx.lineTo(this.x-30,this.y-tail);
    ctx.fill();
  }
}

// 🐟 FISH WITH RARITY
class Fish{
  constructor(){
    this.reset();
  }

  reset(){
    this.x=Math.random()*900;
    this.y=Math.random()*600;

    let r=Math.random();
    if(r<0.7){ this.color="yellow"; this.value=5; }
    else if(r<0.9){ this.color="blue"; this.value=15; }
    else{ this.color="purple"; this.value=40; }
  }

  draw(){
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.ellipse(this.x,this.y,10,6,0,0,Math.PI*2);
    ctx.fill();
  }
}

// 🦈 CHASING ENEMY
class Shark{
  constructor(){
    this.x=Math.random()*900;
    this.y=Math.random()*600;
  }

  update(){
    let dx=player.x-this.x;
    let dy=player.y-this.y;
    let d=Math.hypot(dx,dy);

    this.x+=dx/d*1.5;
    this.y+=dy/d*1.5;
  }

  draw(){
    ctx.fillStyle="gray";
    ctx.beginPath();
    ctx.ellipse(this.x,this.y,30,15,0,0,Math.PI*2);
    ctx.fill();
  }
}

let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

function initGame(){
  player=new Player();
  fishes=Array.from({length:10},()=>new Fish());
  sharks=Array.from({length:3},()=>new Shark());

  loop();
}

function loop(){
  ctx.fillStyle="#003566";
  ctx.fillRect(0,0,900,600);

  player.update();
  player.draw();

  fishes.forEach(f=>{
    f.draw();

    if(Math.hypot(player.x-f.x,player.y-f.y)<20){
      coins+=f.value;
      f.reset();
    }
  });

  sharks.forEach(s=>{
    s.update();
    s.draw();

    if(Math.hypot(player.x-s.x,player.y-s.y)<35){
      gameOver();
    }
  });

  requestAnimationFrame(loop);
}

function gameOver(){
  canvas.style.display="none";
  document.getElementById("lobby").style.display="block";
  updateCoins();
  alert("💀 מתת! חזרת ללובי");
}
</script>
</body>
</html>
