<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🐡 דג הבלון</title>

<style>
body{
  margin:0;
  background:linear-gradient(#001d3d,#003566);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

#wrapper{
  position:relative;
}

canvas{
  border-radius:16px;
  box-shadow:0 0 50px rgba(0,150,255,0.6);
}

#menu{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

#menu h1{
  font-size:42px;
  margin-bottom:10px;
}

#menu p{
  max-width:650px;
  line-height:1.7;
  margin:8px 0;
  font-size:18px;
}

button{
  margin-top:15px;
  padding:14px 24px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#00b4d8;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  background:#48cae4;
}
</style>
</head>

<body>
<div id="wrapper">
<canvas id="game" width="900" height="600"></canvas>

<div id="menu">
  <h1>🐡 דג הבלון</h1>

  <p>🎯 <b>המטרה:</b> לאכול דגים קטנים ולהשיג נקודות</p>

  <p>⚠️ <b>זהירות:</b> כרישים 🦈 ולווייתנים 🐋 יהרגו אותך</p>

  <p>
  💨 <b>יכולת מיוחדת:</b>  
  לחץ SPACE כדי להתנפח → אתה מוציא רעל ☠️  
  אבל זז יותר לאט!
  </p>

  <p>🕹️ תזוזה: WASD או חצים</p>

  <button onclick="startGame()">▶ התחל לשחק</button>
</div>

</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let gameRunning=false;

const rnd=(a,b)=>Math.random()*(b-a)+a;

class Player{
  constructor(){
    this.x=450;
    this.y=300;
    this.r=20;
    this.speed=3;
    this.energy=100;
    this.puffed=false;
    this.poison=[];
  }

  update(){
    let currentSpeed = this.puffed ? 1.8 : 3;

    if(keys["ArrowLeft"]||keys["a"]) this.x-=currentSpeed;
    if(keys["ArrowRight"]||keys["d"]) this.x+=currentSpeed;
    if(keys["ArrowUp"]||keys["w"]) this.y-=currentSpeed;
    if(keys["ArrowDown"]||keys["s"]) this.y+=currentSpeed;

    this.puffed = keys[" "] && this.energy > 0;

    if(this.puffed){
      this.energy -= 0.6;

      if(Math.random()<0.25){
        this.poison.push({
          x:this.x,
          y:this.y,
          r:8,
          life:50
        });
      }
    }else{
      this.energy = Math.min(100,this.energy+0.4);
    }

    this.poison.forEach(p=>{
      p.life--;
      p.r+=0.4;
    });

    this.poison = this.poison.filter(p=>p.life>0);
  }

  draw(){
    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r+(this.puffed?12:0),0,Math.PI*2);
    ctx.fill();

    this.poison.forEach(p=>{
      ctx.globalAlpha=p.life/50;
      ctx.fillStyle="lime";
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    });
  }
}

class Fish{
  constructor(){
    this.respawn();
  }

  respawn(){
    this.x=rnd(0,900);
    this.y=rnd(0,600);
    this.r=10;
  }

  draw(){
    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();
  }
}

class Shark{
  constructor(){
    this.respawn();
  }

  respawn(){
    this.x=rnd(0,900);
    this.y=rnd(0,600);
    this.r=25;
  }

  draw(){
    ctx.fillStyle="gray";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();
  }
}

class Whale{
  constructor(){
    this.respawn();
  }

  respawn(){
    this.x=rnd(0,900);
    this.y=rnd(0,600);
    this.r=50;
  }

  draw(){
    ctx.fillStyle="#0077b6";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();
  }
}

let player;
let fishes=[];
let sharks=[];
let whales=[];
let score=0;

function startGame(){
  document.getElementById("menu").style.display="none";
  gameRunning=true;

  player=new Player();
  fishes=Array.from({length:12},()=>new Fish());
  sharks=Array.from({length:3},()=>new Shark());
  whales=Array.from({length:1},()=>new Whale());

  score=0;

  loop();
}

function loop(){
  if(!gameRunning)return;

  ctx.clearRect(0,0,900,600);

  player.update();
  player.draw();

  fishes.forEach(f=>{
    f.draw();
    if(Math.hypot(player.x-f.x,player.y-f.y)<25){
      score+=10;
      f.respawn();
    }
  });

  sharks.forEach(s=>{
    s.draw();
    if(Math.hypot(player.x-s.x,player.y-s.y)<45){
      gameOver("ננשכת ע\"י כריש!");
    }
  });

  whales.forEach(w=>{
    w.draw();
    if(Math.hypot(player.x-w.x,player.y-w.y)<65){
      gameOver("לווייתן מחץ אותך!");
    }
  });

  drawUI();

  requestAnimationFrame(loop);
}

function drawUI(){
  ctx.fillStyle="white";
  ctx.font="16px Arial";
  ctx.fillText("Score: "+score,20,25);

  ctx.fillStyle="red";
  ctx.fillRect(20,35,100,10);

  ctx.fillStyle="lime";
  ctx.fillRect(20,35,player.energy,10);

  ctx.strokeStyle="white";
  ctx.strokeRect(20,35,100,10);
}

function gameOver(text){
  alert(text);
  location.reload();
}

let keys={};

window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);
</script>
</body>
</html>
