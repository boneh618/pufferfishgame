<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pufferfish Survival</title>
<style>
*{margin:0;padding:0}
body{background:#0a1628;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block;border-radius:8px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var c=document.getElementById('c'),g=c.getContext('2d');
var W=900,H=650;c.width=W;c.height=H;

var state='play',tick=0,wave=1,spawnCd=0,collectCd=0,combo=0,comboT=0;
var shake=0,flash=0,showHelp=true,helpT=200;
var hs=0;try{hs=parseInt(localStorage.getItem('pf_hs'))||0;}catch(e){}
var newHs=false;
var keys={},dx=0,dy=0;

var player={x:W/2,y:H-100,r:18,lives:3,score:0,puff:false,puffCd:0,dash:false,dashT:0,dashCd:0,ddx:0,ddy:0,inv:0,shield:0,speed:0};
var enemies=[],spikes=[],items=[],parts=[],pops=[];

var sweed=[];for(var i=0;i<10;i++)sweed.push({x:40+i*(W-80)/9,h:40+Math.random()*50});

document.addEventListener('keydown',function(e){
  keys[e.keyCode]=true;
  if(showHelp){showHelp=false;helpT=0;}
  if(state==='over'&&e.keyCode===82){resetGame();state='play';}
  if(state==='play'){
    if(e.keyCode===32&&!player.puff&&player.puffCd<=0){player.puff=true;player.puffCd=90;e.preventDefault();}
    if(e.keyCode===16&&!player.dash&&player.dashCd<=0){
      player.dash=true;player.dashT=6;player.dashCd=60;
      player.ddx=dx===0&&dy===0?1:dx;player.ddy=dy;
      boom(player.x,player.y,6,[150,220,255]);
    }
    if(e.keyCode===72){showHelp=!showHelp;helpT=showHelp?99999:0;}
  }
  if(e.keyCode===32||e.keyCode===38||e.keyCode===40)e.preventDefault();
});
document.addEventListener('keyup',function(e){keys[e.keyCode]=false;});

function resetGame(){
  player={x:W/2,y:H-100,r:18,lives:3,score:0,puff:false,puffCd:0,dash:false,dashT:0,dashCd:0,ddx:0,ddy:0,inv:0,shield:0,speed:0};
  enemies=[];spikes=[];items=[];parts=[];pops=[];
  dx=0;dy=0;wave=1;spawnCd=0;collectCd=0;combo=0;comboT=0;shake=0;flash=0;newHs=false;
}

function dist(a,b,cc,d){return Math.sqrt((a-cc)*(a-cc)+(b-d)*(b-d));}
function boom(x,y,n,col){for(var i=0;i<n;i++){var a=Math.random()*6.28,s=1+Math.random()*3;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:25,ml:25,c:col});}}

function update(){
  tick++;
  if(showHelp&&helpT>0){helpT--;if(helpT<=0)showHelp=false;}
  if(state!=='play')return;

  dx=0;dy=0;
  if(keys[37]||keys[65])dx=-1;
  if(keys[39]||keys[68])dx=1;
  if(keys[38]||keys[87])dy=-1;
  if(keys[40]||keys[83])dy=1;

  var p=player;
  if(!p.dash){
    var spd=p.puff?1.5:3.5;
    if(p.speed>0)spd*=1.8;
    p.x=Math.max(p.r,Math.min(W-p.r,p.x+dx*spd));
    p.y=Math.max(p.r+55,Math.min(H-p.r,p.y+dy*spd));
  }
  if(p.puffCd>0)p.puffCd--;else p.puff=false;
  if(p.inv>0)p.inv--;
  if(p.dashCd>0)p.dashCd--;
  if(p.shield>0)p.shield--;
  if(p.speed>0)p.speed--;
  if(p.dash){p.x+=p.ddx*12;p.y+=p.ddy*12;p.x=Math.max(p.r,Math.min(W-p.r,p.x));p.y=Math.max(p.r+55,Math.min(H-p.r,p.y));p.dashT--;if(p.dashT<=0)p.dash=false;}
  if(shake>0)shake--;
  if(flash>0)flash--;
  if(comboT>0){comboT--;if(comboT<=0)combo=0;}

  if(spawnCd<=0){
    var ey=80+Math.random()*(H-160);
    var pats=['s','i','z'];
    var pat=pats[Math.min(Math.floor(Math.random()*(1+wave/2)),2)];
    var dir=Math.random()<0.5?1:-1;
    var tp=0;
    if(wave>=3&&Math.random()<0.2)tp=1;
    if(wave>=5&&Math.random()<0.12)tp=2;
    var sp=2+wave*0.4+(tp===1?2.5:0);
    enemies.push({x:dir===1?-30:W+30,y:ey,by:ey,sp:sp,pat:pat,dir:dir,tp:tp,t:0});
    if(wave>=4&&Math.random()<0.3){var ey2=80+Math.random()*(H-160);enemies.push({x:-dir===1?-30:W+30,y:ey2,by:ey2,sp:2+wave*0.3,pat:'s',dir:-dir,tp:0,t:0});}
    if(wave>2&&Math.random()<0.08+wave*0.01){var sy=80+Math.random()*(H-160);spikes.push({x:60+Math.random()*(W-120),y:sy,by:sy,mv:Math.random()<0.5,t:0});}
    spawnCd=Math.max(35-3*wave,8);
  }else spawnCd--;

  if(collectCd<=0){
    var r2=Math.random(),tp2=r2<0.55?0:r2<0.75?1:r2<0.92?2:3;
    items.push({x:60+Math.random()*(W-120),y:80+Math.random()*(H-160),tp:tp2,t:0});
    collectCd=120+Math.floor(Math.random()*100);
  }else collectCd--;

  var i;
  for(i=0;i<enemies.length;i++){var e=enemies[i];e.x+=e.dir*e.sp;e.t++;if(e.pat==='i')e.y=e.by+40*Math.sin(e.t/18);else if(e.pat==='z')e.y=e.by+30*(Math.floor(e.t/30)%2===0?1:-1);}
  for(i=0;i<spikes.length;i++){var s=spikes[i];if(s.mv){s.y=s.by+18*Math.sin(s.t/12);s.t++;}}
  for(i=0;i<items.length;i++)items[i].t++;
  for(i=parts.length-1;i>=0;i--){var pt=parts[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.05;pt.l--;if(pt.l<=0)parts.splice(i,1);}
  for(i=pops.length-1;i>=0;i--){pops[i].y-=1.2;pops[i].l--;if(pops[i].l<=0)pops.splice(i,1);}

  var pr=p.puff?28:p.r;
  for(i=items.length-1;i>=0;i--){
    var it=items[i];
    if(it.t>600){items.splice(i,1);continue;}
    if(dist(p.x,p.y,it.x,it.y)<pr+14){
      if(it.tp===0){p.score+=15;boom(it.x,it.y,8,[255,200,80]);pops.push({x:it.x,y:it.y,t:'+15',l:40,c:[255,220,50]});}
      if(it.tp===1){p.shield=300;boom(it.x,it.y,10,[80,200,255]);pops.push({x:it.x,y:it.y,t:'SHIELD!',l:40,c:[80,200,255]});}
      if(it.tp===2){p.speed=300;boom(it.x,it.y,10,[80,255,120]);pops.push({x:it.x,y:it.y,t:'SPEED!',l:40,c:[80,255,120]});}
      if(it.tp===3){if(p.lives<5)p.lives++;boom(it.x,it.y,12,[255,80,120]);pops.push({x:it.x,y:it.y,t:'+1 UP!',l:40,c:[255,80,120]});}
      items.splice(i,1);
    }
  }

  for(i=enemies.length-1;i>=0;i--){
    var e=enemies[i];
    if(e.x<-80||e.x>W+80){enemies.splice(i,1);continue;}
    var er=e.tp===2?22:e.tp===1?12:16;
    if(dist(p.x,p.y,e.x,e.y)<pr+er){
      if(p.puff||p.dash){
        var pts=(e.tp===2?25:e.tp===1?15:10);combo++;comboT=90;pts*=Math.min(combo,5);
        p.score+=pts;boom(e.x,e.y,12,[255,100,60]);pops.push({x:e.x,y:e.y,t:'+'+pts,l:40,c:[255,255,100]});enemies.splice(i,1);
      }else if(p.shield>0){boom(e.x,e.y,6,[80,200,255]);enemies.splice(i,1);
      }else if(p.inv<=0){
        p.lives--;p.inv=60;shake=10;flash=15;enemies.splice(i,1);
        if(p.lives<=0){state='over';newHs=false;if(p.score>hs){hs=p.score;try{localStorage.setItem('pf_hs',hs);}catch(ex){}newHs=true;}}
      }
    }
  }

  for(i=spikes.length-1;i>=0;i--){
    var s=spikes[i];
    if(dist(p.x,p.y,s.x,s.y)<pr+14){
      if(p.puff||p.dash||p.shield>0){boom(s.x,s.y,8,[120,100,160]);p.score+=5;pops.push({x:s.x,y:s.y,t:'+5',l:40,c:[200,200,255]});spikes.splice(i,1);
      }else if(p.inv<=0){
        p.lives--;p.inv=60;shake=8;flash=12;
        if(p.lives<=0){state='over';newHs=false;if(p.score>hs){hs=p.score;try{localStorage.setItem('pf_hs',hs);}catch(ex){}newHs=true;}}
      }
    }
  }

  if(p.score>=(30+wave*20)*wave)wave=Math.min(wave+1,30);
  for(i=spikes.length-1;i>=0;i--)if(spikes[i].y<-60||spikes[i].y>H+60)spikes.splice(i,1);
  for(i=items.length-1;i>=0;i--)if(items[i].t>650)items.splice(i,1);
}

function draw(){
  g.save();
  if(shake>0)g.translate((Math.random()-0.5)*12,(Math.random()-0.5)*12);

  var gr=g.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#1e82e6');gr.addColorStop(1,'#081e46');
  g.fillStyle=gr;g.fillRect(0,0,W,H);

  g.globalAlpha=0.06;g.fillStyle='#b4dcff';
  for(var i=0;i<5;i++){
    var rx=120+i*160+25*Math.sin(tick/80+i);
    g.beginPath();g.moveTo(rx-8,0);g.lineTo(rx+8,0);g.lineTo(rx+50+i*10,H);g.lineTo(rx-50-i*10,H);g.fill();
  }
  g.globalAlpha=1;

  for(var i=0;i<30;i++){
    var bx=(i*53+17)%W,by2=H-((tick/60+i*1.3)*40%(H+40)),sz=3+(i%4)*2;
    g.fillStyle='rgba(200,230,255,'+(0.08+(i%3)*0.05)+')';
    g.beginPath();g.arc(bx,by2,sz,0,6.28);g.fill();
  }

  g.fillStyle='rgba(100,200,255,0.18)';
  for(var x=0;x<W;x+=3){
    var wy=46+5*Math.sin(x/40+tick/25)+3*Math.sin(x/20-tick/15);
    g.fillRect(x,0,3,wy);
  }

  g.fillStyle='rgba(180,160,120,0.25)';g.fillRect(0,H-35,W,35);

  g.lineCap='round';
  for(var i=0;i<sweed.length;i++){
    for(var s=0;s<4;s++){
      var t1=s/4,t2=(s+1)/4;
      var sw1=7*Math.sin(tick/30+i+s*0.5),sw2=7*Math.sin(tick/30+i+(s+1)*0.5);
      g.strokeStyle='rgba(30,'+(80+Math.floor(70*(1-t1)))+',30,0.6)';
      g.lineWidth=3;g.beginPath();g.moveTo(sweed[i].x+sw1*t1,H-35-sweed[i].h*t1);g.lineTo(sweed[i].x+sw2*t2,H-35-sweed[i].h*t2);g.stroke();
    }
  }
  g.lineWidth=1;

  for(var i=0;i<items.length;i++){
    var it=items[i],ix=it.x,iy=it.y+3*Math.sin(tick/10+it.x);
    g.fillStyle='rgba(255,255,200,0.12)';g.beginPath();g.arc(ix,iy,14,0,6.28);g.fill();
    if(it.tp===0){g.fillStyle='#ff8c50';g.beginPath();g.arc(ix,iy,7,0,6.28);g.fill();g.fillStyle='#ffb478';g.beginPath();g.arc(ix,iy,4,0,6.28);g.fill();}
    if(it.tp===1){g.fillStyle='rgba(80,180,255,0.8)';g.beginPath();g.arc(ix,iy,10,0,6.28);g.fill();g.fillStyle='#fff';g.font='bold 14px Arial';g.fillText('S',ix-4,iy+5);}
    if(it.tp===2){g.fillStyle='rgba(80,255,120,0.8)';g.beginPath();g.arc(ix,iy,10,0,6.28);g.fill();g.fillStyle='#fff';g.font='bold 13px Arial';g.fillText('>>',ix-8,iy+5);}
    if(it.tp===3){g.fillStyle='#ff5078';g.beginPath();g.arc(ix-4,iy-2,5,0,6.28);g.fill();g.beginPath();g.arc(ix+4,iy-2,5,0,6.28);g.fill();g.beginPath();g.moveTo(ix-9,iy);g.lineTo(ix,iy+9);g.lineTo(ix+9,iy);g.fill();}
  }

  for(var i=0;i<spikes.length;i++){
    var s=spikes[i];
    g.strokeStyle='#282b30';g.lineWidth=2;
    for(var j=0;j<10;j++){var a=6.28*j/10+Math.sin(tick/20)*0.1;g.beginPath();g.moveTo(s.x,s.y);g.lineTo(s.x+Math.cos(a)*20,s.y+Math.sin(a)*20);g.stroke();}
    g.fillStyle='#4a4a5e';g.beginPath();g.arc(s.x,s.y,9,0,6.28);g.fill();
    g.lineWidth=1;
  }

  for(var i=0;i<enemies.length;i++){
    var e=enemies[i],ex=e.x,ey=e.y,er=e.tp===2?22:e.tp===1?12:16,fd=e.dir;
    var bc=e.tp===1?'#3264c8':e.tp===2?'#a01e1e':'#dc4628';
    var tc=e.tp===1?'#2850aa':e.tp===2?'#821414':'#be321e';
    g.fillStyle=tc;g.beginPath();g.moveTo(ex-fd*er,ey);g.lineTo(ex-fd*(er+12),ey-9);g.lineTo(ex-fd*(er+12),ey+9);g.fill();
    g.fillStyle=bc;g.beginPath();g.ellipse(ex,ey,er,er*0.65,0,0,6.28);g.fill();
    g.fillStyle=tc;g.beginPath();g.moveTo(ex-3,ey-er*0.65);g.lineTo(ex+3,ey-er*0.65);g.lineTo(ex,ey-er-5);g.fill();
    var eo=fd*(er/2+2);
    g.fillStyle='#fff';g.beginPath();g.arc(ex+eo,ey,4,0,6.28);g.fill();
    g.fillStyle='#000';g.beginPath();g.arc(ex+eo+fd*2,ey,2,0,6.28);g.fill();
    g.strokeStyle='#501414';g.lineWidth=2;g.beginPath();g.moveTo(ex+eo-4,ey-5);g.lineTo(ex+eo+4,ey-7);g.stroke();g.lineWidth=1;
  }

  for(var i=0;i<parts.length;i++){
    var pt=parts[i],al=Math.max(0,pt.l/pt.ml),sz=2+3*al;
    g.fillStyle='rgba('+pt.c[0]+','+pt.c[1]+','+pt.c[2]+','+al+')';
    g.beginPath();g.arc(pt.x,pt.y,sz,0,6.28);g.fill();
  }

  var p=player,pr=p.puff?28:p.r,px=p.x,py=p.y;
  if(p.inv>0&&Math.floor(tick/3)%2===0){
    g.strokeStyle='rgba(254,224,97,0.3)';g.beginPath();g.arc(px,py,pr+2,0,6.28);g.stroke();
  }else{
    if(p.shield>0){g.fillStyle='rgba(80,200,255,'+(0.12+0.06*Math.sin(tick/5))+')';g.beginPath();g.arc(px,py,pr+10,0,6.28);g.fill();}
    if(p.speed>0){for(var i=1;i<=3;i++){g.fillStyle='rgba(100,255,150,'+(0.15-i*0.04)+')';g.beginPath();g.arc(px+i*dx*5,py+i*dy*5,pr,0,6.28);g.fill();}}
    if(p.puff){g.strokeStyle='#d2aa14';g.lineWidth=2;for(var j=0;j<16;j++){var a=6.28*j/16;g.beginPath();g.moveTo(px+Math.cos(a)*pr,py+Math.sin(a)*pr);g.lineTo(px+Math.cos(a)*(pr+9),py+Math.sin(a)*(pr+9));g.stroke();}g.lineWidth=1;}
    g.fillStyle='#ffe86e';g.beginPath();g.arc(px,py,pr,0,6.28);g.fill();
    g.fillStyle='rgba(255,245,200,0.5)';g.beginPath();g.ellipse(px,py+2,pr*0.45,pr*0.3,0,0,6.28);g.fill();
    g.fillStyle='#fff';g.beginPath();g.arc(px+pr/3+4,py-2,6,0,6.28);g.fill();
    g.fillStyle='#143264';g.beginPath();g.arc(px+pr/3+6,py,3,0,6.28);g.fill();
    g.fillStyle='#fff';g.beginPath();g.arc(px+pr/3+6.5,py-1.5,1.3,0,6.28);g.fill();
    g.strokeStyle='#b4783c';g.lineWidth=2;
    if(p.puff){g.fillStyle='#b4783c';g.beginPath();g.arc(px+2,py+12,4,0,6.28);g.fill();}
    else{g.beginPath();g.arc(px+4,py+10,6,0,3.14);g.stroke();}
    g.lineWidth=1;
    g.fillStyle='#f0c83c';g.beginPath();g.moveTo(px-3,py-pr);g.lineTo(px+3,py-pr);g.lineTo(px,py-pr-8);g.fill();
    g.fillStyle='#e6be32';g.beginPath();g.moveTo(px-pr+2,py);g.lineTo(px-pr-9,py-7);g.lineTo(px-pr-9,py+7);g.fill();
    g.fillStyle='rgba(255,255,255,0.2)';g.beginPath();g.ellipse(px-1,py-pr*0.35,pr*0.4,pr*0.2,0,0,6.28);g.fill();
  }

  for(var i=0;i<pops.length;i++){
    var sp=pops[i],al=Math.min(1,sp.l/20);
    g.font='bold 18px Arial';g.fillStyle='rgba('+sp.c[0]+','+sp.c[1]+','+sp.c[2]+','+al+')';
    g.fillText(sp.t,sp.x,sp.y);
  }

  g.fillStyle='rgba(0,0,0,0.3)';g.fillRect(0,0,W,52);
  for(var i=0;i<player.lives;i++){
    var hx=18+i*28,hy=12;
    g.fillStyle='#ff5064';g.beginPath();g.arc(hx+5,hy+5,5,0,6.28);g.fill();g.beginPath();g.arc(hx+13,hy+5,5,0,6.28);g.fill();
    g.beginPath();g.moveTo(hx,hy+7);g.lineTo(hx+9,hy+18);g.lineTo(hx+18,hy+7);g.fill();
  }
  g.fillStyle='#fff';g.font='bold 20px Arial';
  g.fillText('Wave '+wave,W-120,30);
  g.fillText('Score: '+player.score,W/2-45,30);
  g.font='14px Arial';g.fillStyle='rgba(255,255,200,0.6)';
  g.fillText('Best: '+hs,W/2-25,46);
  if(combo>1){g.font='bold 18px Arial';g.fillStyle='#ffff32';g.fillText('x'+combo+' COMBO!',W/2+75,30);}

  var barY=H-18;
  g.fillStyle='rgba(0,0,0,0.2)';g.fillRect(15,barY-4,100,14);
  var pp=player.puff?1:(player.puffCd>0?1-player.puffCd/90:1);
  g.fillStyle='#ffdc32';g.fillRect(15,barY-4,Math.max(1,100*pp),14);
  g.fillStyle='#fff';g.font='10px Arial';g.fillText(player.puff?'PUFFED!':player.puffCd>0?'Puff...':'Puff [SPACE]',22,barY+7);
  g.fillStyle='rgba(0,0,0,0.2)';g.fillRect(125,barY-4,100,14);
  var dp=player.dash?1:(player.dashCd>0?1-player.dashCd/60:1);
  g.fillStyle='#64c8ff';g.fillRect(125,barY-4,Math.max(1,100*dp),14);
  g.fillStyle='#fff';g.fillText(player.dash?'DASH!':player.dashCd>0?'Dash...':'Dash [SHIFT]',132,barY+7);

  var py2=68;
  if(player.shield>0){g.fillStyle='rgba(80,200,255,0.7)';g.font='bold 13px Arial';g.fillText('SHIELD: '+(Math.floor(player.shield/60)+1)+'s',14,py2);py2+=18;}
  if(player.speed>0){g.fillStyle='rgba(80,255,120,0.7)';g.font='bold 13px Arial';g.fillText('SPEED: '+(Math.floor(player.speed/60)+1)+'s',14,py2);}

  g.fillStyle='rgba(255,255,255,0.1)';g.fillRect(W-40,58,30,30);
  g.fillStyle='rgba(255,255,255,0.6)';g.font='bold 18px Arial';g.fillText('?',W-31,80);

  if(flash>0){g.fillStyle='rgba(255,40,40,'+(flash*0.025)+')';g.fillRect(0,0,W,H);}

  if(showHelp){
    g.fillStyle='rgba(0,0,20,0.8)';g.fillRect(W/2-170,H/2-105,340,210);
    g.strokeStyle='rgba(100,200,255,0.3)';g.lineWidth=2;g.strokeRect(W/2-170,H/2-105,340,210);g.lineWidth=1;
    g.fillStyle='#fff064';g.font='bold 24px Arial';g.fillText('Controls',W/2-45,H/2-72);
    g.font='bold 15px Arial';
    var ctl=[['WASD / Arrows','Move'],['SPACE','Puff Up (kill enemies)'],['SHIFT','Dash (quick burst)'],['H','Toggle this help']];
    for(var i=0;i<ctl.length;i++){
      var ly=H/2-42+i*32;
      g.fillStyle='rgba(255,255,255,0.1)';
      var kw=g.measureText(ctl[i][0]).width+12;
      g.fillRect(W/2-150,ly-12,kw,22);
      g.fillStyle='#ffdc32';g.fillText(ctl[i][0],W/2-144,ly+4);
      g.fillStyle='#c8dcff';g.font='14px Arial';g.fillText(ctl[i][1],W/2-144+kw+8,ly+4);
      g.font='bold 15px Arial';
    }
    g.font='12px Arial';g.fillStyle='rgba(200,220,255,0.5)';
    g.fillText('Collect food & power-ups! Press any key to play...',W/2-150,H/2+90);
  }

  if(state==='over'){
    g.fillStyle='rgba(0,0,0,0.45)';g.fillRect(0,0,W,H);
    g.fillStyle='rgba(255,255,255,0.9)';g.fillRect(W/2-190,H/2-105,380,210);
    g.strokeStyle='rgba(19,46,99,0.2)';g.lineWidth=2;g.strokeRect(W/2-190,H/2-105,380,210);g.lineWidth=1;
    g.fillStyle='#132e63';g.font='bold 40px Arial';g.fillText('Game Over!',W/2-115,H/2-50);
    g.font='bold 24px Arial';g.fillText('Score: '+player.score,W/2-50,H/2-10);
    g.font='bold 18px Arial';g.fillStyle='#3c3c50';
    g.fillText('Wave reached: '+wave,W/2-62,H/2+20);
    g.fillText('High Score: '+hs,W/2-55,H/2+48);
    if(newHs){g.fillStyle='#ebb400';g.font='bold 20px Arial';g.fillText('NEW HIGH SCORE!',W/2-90,H/2+78);}
    if(Math.floor(tick/30)%2===0){g.fillStyle='#505078';g.font='bold 16px Arial';g.fillText('Press R to Restart',W/2-80,H/2+120);}
  }

  g.restore();
}

c.addEventListener('click',function(e){
  var rect=c.getBoundingClientRect();
  var mx=(e.clientX-rect.left)*(W/rect.width);
  var my=(e.clientY-rect.top)*(H/rect.height);
  if(mx>=W-40&&mx<=W-10&&my>=58&&my<=88){showHelp=!showHelp;helpT=showHelp?99999:0;}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐡 Pufferfish Survival</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { border-radius: 8px; box-shadow: 0 0 40px rgba(30,130,230,0.3); display: block; }
</style>
</head>
<body>
<canvas id="game" width="900" height="650"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 650;

// Safe rounded rectangle that works on ALL browsers
function rrPath(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.arcTo(x + w, y, x + w, y + r, r);
  c.lineTo(x + w, y + h - r);
  c.arcTo(x + w, y + h, x + w - r, y + h, r);
  c.lineTo(x + r, y + h);
  c.arcTo(x, y + h, x, y + h - r, r);
  c.lineTo(x, y + r);
  c.arcTo(x, y, x + r, y, r);
  c.closePath();
}
function fillRR(c, x, y, w, h, r) { rrPath(c, x, y, w, h, r); c.fill(); }
function strokeRR(c, x, y, w, h, r) { rrPath(c, x, y, w, h, r); c.stroke(); }

// Game state
let state = 'playing'; // playing, gameover
let tick = 0;
let highscore = parseInt(localStorage.getItem('pufferfish_hs') || '0');
let newHighscore = false;
let shakeFrames = 0, shakeIntensity = 0;
let damageFlash = 0;
let combo = 0, comboTimer = 0;
let wave = 1, spawnCd = 0, collectCd = 0;
let dx = 0, dy = 0;
let keys = {};

// Controls overlay
let showControls = true;
let controlsTimer = 250; // ~4 seconds then fade
let helpHover = false;

// Seaweed
const seaweed = [];
for (let i = 0; i < 12; i++) {
  seaweed.push({ x: 30 + (W - 60) * i / 11, h: 50 + Math.random() * 60 });
}

// Player
let p = makePufferfish();
function makePufferfish() {
  return {
    x: W / 2, y: H - 100, radius: 18, lives: 3, score: 0,
    puffed: false, puffCooldown: 0,
    dashing: false, dashTimer: 0, dashCooldown: 0, dashDx: 0, dashDy: 0,
    iFrames: 0, shielded: false, shieldTimer: 0, speedBoosted: false, speedTimer: 0
  };
}

let enemies = [], spikes = [], collectibles = [], particles = [], popups = [];

// Controls
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  // Dismiss controls overlay on any key
  if (showControls) { showControls = false; controlsTimer = 0; }
  if (state === 'gameover') {
    if (e.code === 'KeyR') { resetGame(); state = 'playing'; }
  }
  if (state === 'playing') {
    if (e.code === 'Space' && p.puffCooldown === 0 && !p.puffed) {
      p.puffed = true; p.puffCooldown = 90; e.preventDefault();
    }
    if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && p.dashCooldown === 0 && !p.dashing) {
      p.dashing = true; p.dashTimer = 6; p.dashCooldown = 60;
      p.dashDx = dx === 0 && dy === 0 ? 1 : dx;
      p.dashDy = dy;
      spawnParticles(p.x, p.y, 8, [150, 220, 255]);
    }
    // Toggle help with H
    if (e.code === 'KeyH') { showControls = !showControls; controlsTimer = showControls ? 999999 : 0; }
  }
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Help button click
canvas.addEventListener('click', e => {
  let rect = canvas.getBoundingClientRect();
  let mx = (e.clientX - rect.left) * (W / rect.width);
  let my = (e.clientY - rect.top) * (H / rect.height);
  // "?" button top-right
  if (mx >= W - 42 && mx <= W - 10 && my >= 60 && my <= 92) {
    showControls = !showControls; controlsTimer = showControls ? 999999 : 0;
  }
});
canvas.addEventListener('mousemove', e => {
  let rect = canvas.getBoundingClientRect();
  let mx = (e.clientX - rect.left) * (W / rect.width);
  let my = (e.clientY - rect.top) * (H / rect.height);
  helpHover = (mx >= W - 42 && mx <= W - 10 && my >= 60 && my <= 92);
  canvas.style.cursor = helpHover ? 'pointer' : 'default';
});

function getDir() {
  let mdx = 0, mdy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) mdx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) mdx = 1;
  if (keys['ArrowUp'] || keys['KeyW']) mdy = -1;
  if (keys['ArrowDown'] || keys['KeyS']) mdy = 1;
  return [mdx, mdy];
}

function resetGame() {
  p = makePufferfish();
  enemies = []; spikes = []; collectibles = []; particles = []; popups = [];
  dx = 0; dy = 0; wave = 1; spawnCd = 0; collectCd = 0;
  shakeFrames = 0; damageFlash = 0; combo = 0; comboTimer = 0; newHighscore = false;
}

function endGame() {
  state = 'gameover';
  newHighscore = false;
  if (p.score > highscore) { highscore = p.score; localStorage.setItem('pufferfish_hs', highscore); newHighscore = true; }
}

function collide(x1, y1, r1, x2, y2, r2) {
  let ddx = x1 - x2, ddy = y1 - y2;
  return Math.sqrt(ddx * ddx + ddy * ddy) < r1 + r2;
}

function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    let a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 20 + Math.random() * 20 | 0, maxLife: 35, color });
  }
}

// ========== UPDATE ==========
function update() {
  tick++;
  // Controls overlay auto-fade
  if (showControls && controlsTimer > 0) { controlsTimer--; if (controlsTimer === 0) showControls = false; }
  if (state !== 'playing') return;

  [dx, dy] = getDir();

  // Movement
  if (!p.dashing) {
    let speed = p.puffed ? 1.5 : 3.5;
    if (p.speedBoosted) speed *= 1.8;
    p.x = Math.max(p.radius, Math.min(W - p.radius, p.x + dx * speed));
    p.y = Math.max(p.radius + 60, Math.min(H - p.radius, p.y + dy * speed));
  }

  // Player updates
  if (p.puffCooldown > 0) p.puffCooldown--; else p.puffed = false;
  if (p.iFrames > 0) p.iFrames--;
  if (p.dashCooldown > 0) p.dashCooldown--;
  if (p.shieldTimer > 0) { p.shieldTimer--; if (p.shieldTimer === 0) p.shielded = false; }
  if (p.speedTimer > 0) { p.speedTimer--; if (p.speedTimer === 0) p.speedBoosted = false; }
  if (p.dashing) {
    p.x += p.dashDx * 12; p.y += p.dashDy * 12;
    p.x = Math.max(p.radius, Math.min(W - p.radius, p.x));
    p.y = Math.max(p.radius + 60, Math.min(H - p.radius, p.y));
    p.dashTimer--; if (p.dashTimer <= 0) p.dashing = false;
  }
  if (shakeFrames > 0) shakeFrames--;
  if (damageFlash > 0) damageFlash--;
  if (comboTimer > 0) { comboTimer--; if (comboTimer === 0) combo = 0; }

  // Spawn enemies
  if (spawnCd <= 0) {
    let ey = 80 + Math.random() * (H - 160);
    let pats = ['straight', 'sine', 'zigzag'];
    let pat = pats[Math.min(Math.floor(Math.random() * (1 + wave / 2)), pats.length - 1)];
    let dir = Math.random() < 0.5 ? 1 : -1;
    let type = 0;
    if (wave >= 3 && Math.random() < 0.2) type = 1;
    if (wave >= 5 && Math.random() < 0.12) type = 2;
    let speed = 2 + wave * 0.4 + (type === 1 ? 2.5 : 0);
    enemies.push({ x: dir === 1 ? -30 : W + 30, y: ey, baseY: ey, speed, pattern: pat, dir, type, time: 0 });
    if (wave >= 4 && Math.random() < 0.3) {
      let ey2 = 80 + Math.random() * (H - 160);
      enemies.push({ x: -dir === 1 ? -30 : W + 30, y: ey2, baseY: ey2, speed: 2 + wave * 0.3, pattern: 'straight', dir: -dir, type: 0, time: 0 });
    }
    if (wave > 2 && Math.random() < 0.08 + wave * 0.01)
      spikes.push({ x: 60 + Math.random() * (W - 120), y: 80 + Math.random() * (H - 160), baseY: 80 + Math.random() * (H - 160), moving: Math.random() < 0.5, time: 0 });
    spawnCd = Math.max(35 - 3 * wave, 8);
  } else spawnCd--;

  // Spawn collectibles
  if (collectCd <= 0) {
    let cx = 60 + Math.random() * (W - 120), cy = 80 + Math.random() * (H - 160);
    let r = Math.random(), type = r < 0.55 ? 0 : r < 0.75 ? 1 : r < 0.92 ? 2 : 3;
    collectibles.push({ x: cx, y: cy, type, time: 0 });
    collectCd = 120 + Math.random() * 100 | 0;
  } else collectCd--;

  // Update entities
  enemies.forEach(en => {
    en.x += en.dir * en.speed; en.time++;
    if (en.pattern === 'sine') en.y = en.baseY + 40 * Math.sin(en.time / 18);
    else if (en.pattern === 'zigzag') en.y = en.baseY + 30 * (Math.floor(en.time / 30) % 2 === 0 ? 1 : -1);
  });
  spikes.forEach(s => { if (s.moving) { s.y = s.baseY + 18 * Math.sin(s.time / 12); s.time++; } });
  collectibles.forEach(c => c.time++);
  particles.forEach(pt => { pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.05; pt.life--; });
  popups.forEach(sp => { sp.y -= 1.2; sp.life--; });
  particles = particles.filter(pt => pt.life > 0);
  popups = popups.filter(sp => sp.life > 0);

  // Collectible pickup
  let pR = p.puffed ? 28 : p.radius;
  collectibles = collectibles.filter(c => {
    if (c.time > 600) return false;
    if (!collide(p.x, p.y, pR, c.x, c.y, 14)) return true;
    if (c.type === 0) { let pts = 15; p.score += pts; spawnParticles(c.x, c.y, 8, [255, 200, 80]); popups.push({ x: c.x, y: c.y, text: '+' + pts, life: 40, color: [255, 220, 50] }); }
    if (c.type === 1) { p.shielded = true; p.shieldTimer = 300; spawnParticles(c.x, c.y, 12, [80, 200, 255]); popups.push({ x: c.x, y: c.y, text: 'SHIELD!', life: 40, color: [80, 200, 255] }); }
    if (c.type === 2) { p.speedBoosted = true; p.speedTimer = 300; spawnParticles(c.x, c.y, 12, [80, 255, 120]); popups.push({ x: c.x, y: c.y, text: 'SPEED!', life: 40, color: [80, 255, 120] }); }
    if (c.type === 3) { if (p.lives < 5) p.lives++; spawnParticles(c.x, c.y, 15, [255, 80, 120]); popups.push({ x: c.x, y: c.y, text: '+1 LIFE!', life: 40, color: [255, 80, 120] }); }
    return false;
  });

  // Enemy collisions
  enemies = enemies.filter(en => {
    if (en.x < -80 || en.x > W + 80) return false;
    let enR = en.type === 2 ? 22 : en.type === 1 ? 12 : 16;
    if (!collide(p.x, p.y, pR, en.x, en.y, enR)) return true;
    if (p.puffed || p.dashing) {
      let pts = (en.type === 2 ? 25 : en.type === 1 ? 15 : 10); combo++; comboTimer = 90; pts *= Math.min(combo, 5);
      p.score += pts; spawnParticles(en.x, en.y, 15, [255, 100, 60]); popups.push({ x: en.x, y: en.y, text: '+' + pts, life: 40, color: [255, 255, 100] }); return false;
    }
    if (p.shielded) { spawnParticles(en.x, en.y, 8, [80, 200, 255]); return false; }
    if (p.iFrames <= 0) {
      p.lives--; p.iFrames = 60; shakeFrames = 10; shakeIntensity = 6; damageFlash = 15;
      if (p.lives <= 0) { endGame(); } return false;
    }
    return true;
  });

  // Spike collisions
  spikes = spikes.filter(s => {
    if (!collide(p.x, p.y, pR, s.x, s.y, 14)) return true;
    if (p.puffed || p.dashing || p.shielded) {
      spawnParticles(s.x, s.y, 10, [120, 100, 160]); p.score += 5;
      popups.push({ x: s.x, y: s.y, text: '+5', life: 40, color: [200, 200, 255] }); return false;
    }
    if (p.iFrames <= 0) {
      p.lives--; p.iFrames = 60; shakeFrames = 8; shakeIntensity = 5; damageFlash = 12;
      if (p.lives <= 0) endGame();
    }
    return true;
  });

  // Wave
  let waveThreshold = 30 + wave * 20;
  if (p.score >= waveThreshold * wave) wave = Math.min(wave + 1, 30);

  // Cleanup
  spikes = spikes.filter(s => s.y > -60 && s.y < H + 60);
  collectibles = collectibles.filter(c => c.time < 650);
}

// ========== DRAW ==========
function draw() {
  ctx.save();
  if (shakeFrames > 0) ctx.translate((Math.random() - 0.5) * shakeIntensity * 2, (Math.random() - 0.5) * shakeIntensity * 2);

  drawBackground();
  drawSeaweed();
  drawCollectibles();
  drawSpikes();
  drawEnemies();
  drawParticles();
  drawPufferfish();
  drawPopups();
  drawHUD();
  drawHelpButton();
  if (damageFlash > 0) { ctx.fillStyle = `rgba(255,50,50,${Math.min(damageFlash * 0.03, 0.45)})`; ctx.fillRect(-20, -20, W + 40, H + 40); }
  if (showControls) drawControlsOverlay();
  if (state === 'gameover') drawGameOver();
  ctx.restore();
}

function drawBackground() {
  let grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1e82e6'); grad.addColorStop(1, '#081e46');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Light rays
  ctx.globalAlpha = 0.07;
  for (let i = 0; i < 6; i++) {
    let rx = 120 + i * 140 + 30 * Math.sin(tick / 80 + i);
    ctx.fillStyle = '#b4dcff';
    ctx.beginPath();
    ctx.moveTo(rx - 10, 0); ctx.lineTo(rx + 10, 0);
    ctx.lineTo(rx + 60 + i * 10, H); ctx.lineTo(rx - 60 - i * 10, H);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Bubbles
  for (let i = 0; i < 40; i++) {
    let bx = (i * 53 + 17) % W;
    let by = H - ((tick / 60 + i * 1.3) * 40 % (H + 40));
    let size = 4 + (i % 5) * 2;
    ctx.fillStyle = `rgba(200,230,255,${0.1 + (i % 3) * 0.06})`;
    ctx.beginPath(); ctx.arc(bx, by, size / 2, 0, Math.PI * 2); ctx.fill();
  }

  // Wave surface
  ctx.fillStyle = 'rgba(100,200,255,0.22)';
  for (let x = 0; x < W; x += 2) {
    let wy = 48 + 6 * Math.sin(x / 40 + tick / 25) + 3 * Math.sin(x / 20 - tick / 15);
    ctx.fillRect(x, 0, 2, wy);
  }

  // Sandy bottom
  let sand = ctx.createLinearGradient(0, H - 40, 0, H);
  sand.addColorStop(0, 'rgba(194,178,128,0.3)'); sand.addColorStop(1, 'rgba(160,140,100,0.47)');
  ctx.fillStyle = sand; ctx.fillRect(0, H - 40, W, 40);
  ctx.fillStyle = 'rgba(170,155,110,0.2)';
  for (let i = 0; i < W; i += 30) { ctx.fillRect(i, H - 25 + (i * 3) % 10, 20 + (i * 7) % 15, 6); }
}

function drawSeaweed() {
  ctx.lineWidth = 4; ctx.lineCap = 'round';
  seaweed.forEach((sw, i) => {
    for (let seg = 0; seg < 5; seg++) {
      let t = seg / 5, sway = 8 * Math.sin(tick / 30 + i + seg * 0.5);
      let x1 = sw.x + sway * t, y1 = H - 40 - sw.h * t;
      let t2 = (seg + 1) / 5, sway2 = 8 * Math.sin(tick / 30 + i + (seg + 1) * 0.5);
      let x2 = sw.x + sway2 * t2, y2 = H - 40 - sw.h * t2;
      ctx.strokeStyle = `rgba(30,${80 + 80 * (1 - t) | 0},30,0.7)`;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      if (seg === 2 || seg === 4) {
        let ld = (seg + i) % 2 === 0 ? 1 : -1;
        ctx.fillStyle = ctx.strokeStyle;
        ctx.beginPath(); ctx.ellipse(x1 + ld * 4 + 5, y1, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
      }
    }
  });
  ctx.lineWidth = 1;
}

function drawCollectibles() {
  collectibles.forEach(c => {
    let cx = c.x, cy = c.y + 3 * Math.sin(tick / 10 + c.x);
    ctx.fillStyle = 'rgba(255,255,200,0.15)'; ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI * 2); ctx.fill();
    if (c.type === 0) { // Food
      ctx.fillStyle = '#ff8c50'; ctx.beginPath(); ctx.ellipse(cx, cy, 6, 8, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffb478'; ctx.beginPath(); ctx.ellipse(cx, cy, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
    } else if (c.type === 1) { // Shield
      ctx.fillStyle = 'rgba(80,180,255,0.8)'; ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.fillText('S', cx - 4, cy + 5);
    } else if (c.type === 2) { // Speed
      ctx.fillStyle = 'rgba(80,255,120,0.8)'; ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.fillText('>>', cx - 8, cy + 5);
    } else { // Life
      ctx.fillStyle = '#ff5078';
      ctx.beginPath(); ctx.arc(cx - 4, cy - 2, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 4, cy - 2, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 10, cy); ctx.lineTo(cx, cy + 10); ctx.lineTo(cx + 10, cy); ctx.fill();
    }
  });
}

function drawSpikes() {
  spikes.forEach(s => {
    let px = s.x, py = s.y;
    ctx.strokeStyle = '#282b30'; ctx.lineWidth = 2;
    for (let j = 0; j < 12; j++) {
      let a = Math.PI * 2 * j / 12 + Math.sin(tick / 20) * 0.1;
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + Math.cos(a) * 22, py + Math.sin(a) * 22); ctx.stroke();
    }
    let ug = ctx.createRadialGradient(px, py, 2, px, py, 10);
    ug.addColorStop(0, '#5a5a6e'); ug.addColorStop(1, '#1e192d');
    ctx.fillStyle = ug; ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(180,160,220,0.3)'; ctx.beginPath(); ctx.ellipse(px, py - 4, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 1;
  });
}

function drawEnemies() {
  enemies.forEach(e => {
    let ex = e.x, ey = e.y, r = e.type === 2 ? 22 : e.type === 1 ? 12 : 16;
    let fd = e.dir;
    let body, tail, belly;
    if (e.type === 1) { body = '#3264c8'; tail = '#2850aa'; belly = '#8cb4f0'; }
    else if (e.type === 2) { body = '#a01e1e'; tail = '#821414'; belly = '#dc7878'; }
    else { body = '#dc4628'; tail = '#be321e'; belly = '#fab48c'; }

    // Tail
    ctx.fillStyle = tail;
    ctx.beginPath(); ctx.moveTo(ex - fd * r, ey); ctx.lineTo(ex - fd * (r + 14), ey - 10); ctx.lineTo(ex - fd * (r + 14), ey + 10); ctx.fill();

    // Body
    let bg = ctx.createLinearGradient(ex - r, ey - r / 2, ex + r, ey + r / 2);
    bg.addColorStop(0, body); bg.addColorStop(1, belly);
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.ellipse(ex, ey, r, r * 2 / 3, 0, 0, Math.PI * 2); ctx.fill();

    // Top fin
    ctx.fillStyle = tail;
    ctx.beginPath(); ctx.moveTo(ex - 4, ey - r * 2 / 3); ctx.lineTo(ex + 4, ey - r * 2 / 3); ctx.lineTo(ex, ey - r - 6); ctx.fill();

    // Eye
    let eo = fd * (r / 2 + 2);
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ex + eo, ey, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(ex + eo + fd * 2, ey, 2.5, 0, Math.PI * 2); ctx.fill();

    // Eyebrow
    ctx.strokeStyle = '#501414'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ex + eo - 5, ey - 6 - fd); ctx.lineTo(ex + eo + 5, ey - 8 + fd); ctx.stroke();
    ctx.lineWidth = 1;
  });
}

function drawPufferfish() {
  let radius = p.puffed ? 28 : p.radius;
  let px = p.x, py = p.y;

  // Blink during iFrames
  if (p.iFrames > 0 && Math.floor(tick / 3) % 2 === 0) {
    ctx.strokeStyle = 'rgba(254,224,97,0.3)'; ctx.beginPath(); ctx.arc(px, py, radius + 2, 0, Math.PI * 2); ctx.stroke(); return;
  }

  // Shield glow
  if (p.shielded) {
    ctx.fillStyle = `rgba(80,200,255,${0.15 + 0.08 * Math.sin(tick / 5)})`;
    ctx.beginPath(); ctx.arc(px, py, radius + 10, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(120,220,255,0.4)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(px, py, radius + 8, 0, Math.PI * 2); ctx.stroke(); ctx.lineWidth = 1;
  }

  // Speed trail
  if (p.speedBoosted) {
    for (let i = 1; i <= 3; i++) {
      ctx.fillStyle = `rgba(100,255,150,${0.2 - i * 0.05})`;
      ctx.beginPath(); ctx.arc(px + i * dx * 6, py + i * dy * 6, radius, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Spines when puffed
  if (p.puffed) {
    ctx.strokeStyle = '#d2aa14'; ctx.lineWidth = 2;
    for (let j = 0; j < 20; j++) {
      let a = Math.PI * 2 * j / 20 + Math.sin(tick / 8) * 0.05;
      ctx.beginPath();
      ctx.moveTo(px + Math.cos(a) * radius, py + Math.sin(a) * radius);
      ctx.lineTo(px + Math.cos(a) * (radius + 10), py + Math.sin(a) * (radius + 10));
      ctx.stroke();
    }
    ctx.lineWidth = 1;
  }

  // Body
  let bg = ctx.createRadialGradient(px - radius * 0.3, py - radius * 0.3, radius * 0.1, px, py, radius);
  bg.addColorStop(0, '#ffeb6e'); bg.addColorStop(1, '#e6be32');
  ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(px, py, radius, 0, Math.PI * 2); ctx.fill();

  // Belly
  ctx.fillStyle = 'rgba(255,245,200,0.6)';
  ctx.beginPath(); ctx.ellipse(px, py + 2, radius * 0.5, radius * 0.35, 0, 0, Math.PI * 2); ctx.fill();

  // Eye
  let es = radius / 3;
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(px + es + 5, py - 2, 6.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#143264'; ctx.beginPath(); ctx.arc(px + es + 7, py, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(px + es + 7.5, py - 1.5, 1.5, 0, Math.PI * 2); ctx.fill();

  // Mouth
  ctx.strokeStyle = '#b4783c'; ctx.lineWidth = 2;
  if (p.puffed) { ctx.fillStyle = '#b4783c'; ctx.beginPath(); ctx.ellipse(px + 2, py + 11, 4, 5, 0, 0, Math.PI * 2); ctx.fill(); }
  else { ctx.beginPath(); ctx.arc(px + 5, py + 10, 7, 0, Math.PI); ctx.stroke(); }
  ctx.lineWidth = 1;

  // Cheek
  ctx.fillStyle = 'rgba(255,160,120,0.35)'; ctx.beginPath(); ctx.ellipse(px - radius * 0.2, py + 5, 5, 3.5, 0, 0, Math.PI * 2); ctx.fill();

  // Top fin
  ctx.fillStyle = '#f0c83c';
  ctx.beginPath(); ctx.moveTo(px - 4, py - radius); ctx.lineTo(px + 4, py - radius); ctx.lineTo(px, py - radius - 10); ctx.fill();

  // Side fin
  ctx.fillStyle = 'rgba(240,210,80,0.7)';
  ctx.beginPath(); ctx.ellipse(px - radius + 2 + 2 * Math.sin(tick / 6), py + 2, 6, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Tail
  ctx.fillStyle = '#e6be32';
  ctx.beginPath(); ctx.moveTo(px - radius + 2, py); ctx.lineTo(px - radius - 10, py - 8); ctx.lineTo(px - radius - 10, py + 8); ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.ellipse(px - 2, py - radius * 0.4, radius * 0.45, radius * 0.22, 0, 0, Math.PI * 2); ctx.fill();
}

function drawParticles() {
  particles.forEach(pt => {
    let a = Math.max(0, pt.life / pt.maxLife);
    ctx.fillStyle = `rgba(${pt.color[0]},${pt.color[1]},${pt.color[2]},${a})`;
    let sz = 3 + 4 * a;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, sz / 2, 0, Math.PI * 2); ctx.fill();
  });
}

function drawPopups() {
  popups.forEach(sp => {
    let a = Math.min(1, sp.life / 20);
    ctx.font = 'bold 18px Arial';
    ctx.fillStyle = `rgba(${sp.color[0]},${sp.color[1]},${sp.color[2]},${a})`;
    ctx.fillText(sp.text, sp.x, sp.y);
  });
}

function drawHeart(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x + size * 0.3, y + size * 0.3, size * 0.35, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + size * 0.7, y + size * 0.3, size * 0.35, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x, y + size * 0.4); ctx.lineTo(x + size / 2, y + size); ctx.lineTo(x + size, y + size * 0.4); ctx.fill();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, W, 55);
  for (let i = 0; i < p.lives; i++) drawHeart(18 + i * 30, 10, 22, '#ff5064');
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial';
  ctx.fillText('Wave ' + wave, W - 130, 28);
  ctx.fillText('Score: ' + p.score, W / 2 - 50, 28);
  ctx.font = '15px Arial'; ctx.fillStyle = 'rgba(255,255,200,0.7)';
  ctx.fillText('Best: ' + highscore, W / 2 - 30, 46);

  if (combo > 1) { ctx.font = 'bold 20px Arial'; ctx.fillStyle = `rgba(255,255,50,${Math.min(1, 0.6 + combo * 0.08)})`; ctx.fillText('x' + combo + ' COMBO!', W / 2 + 80, 28); }

  // Cooldown bars
  let barY = H - 20;
  // Puff
  ctx.fillStyle = 'rgba(0,0,0,0.25)'; fillRR(ctx, 15, barY - 5, 110, 16, 8);
  let puffPct = p.puffed ? 1 : (p.puffCooldown > 0 ? 1 - p.puffCooldown / 90 : 1);
  ctx.fillStyle = '#ffdc32'; fillRR(ctx, 15, barY - 5, Math.max(1, 110 * puffPct), 16, 8);
  ctx.fillStyle = '#fff'; ctx.font = '11px Arial';
  ctx.fillText(p.puffed ? 'PUFFED!' : p.puffCooldown > 0 ? 'Puff...' : 'Puff [SPACE]', 25, barY + 7);
  // Dash
  ctx.fillStyle = 'rgba(0,0,0,0.25)'; fillRR(ctx, 135, barY - 5, 110, 16, 8);
  let dashPct = p.dashing ? 1 : (p.dashCooldown > 0 ? 1 - p.dashCooldown / 60 : 1);
  ctx.fillStyle = '#64c8ff'; fillRR(ctx, 135, barY - 5, Math.max(1, 110 * dashPct), 16, 8);
  ctx.fillStyle = '#fff';
  ctx.fillText(p.dashing ? 'DASH!' : p.dashCooldown > 0 ? 'Dash...' : 'Dash [SHIFT]', 145, barY + 7);

  let powerY = 70;
  if (p.shielded) { ctx.fillStyle = 'rgba(80,200,255,0.7)'; ctx.font = 'bold 14px Arial'; ctx.fillText('SHIELD: ' + (Math.floor(p.shieldTimer / 60) + 1) + 's', 15, powerY); powerY += 20; }
  if (p.speedBoosted) { ctx.fillStyle = 'rgba(80,255,120,0.7)'; ctx.font = 'bold 14px Arial'; ctx.fillText('SPEED: ' + (Math.floor(p.speedTimer / 60) + 1) + 's', 15, powerY); }
}

function drawControlsOverlay() {
  // Semi-transparent overlay panel
  let pw = 360, ph = 220, px = W / 2 - pw / 2, py = H / 2 - ph / 2;
  ctx.fillStyle = 'rgba(0,0,20,0.75)';
  fillRR(ctx, px, py, pw, ph, 16);
  ctx.strokeStyle = 'rgba(100,200,255,0.4)'; ctx.lineWidth = 2;
  strokeRR(ctx, px, py, pw, ph, 16); ctx.lineWidth = 1;

  ctx.fillStyle = '#fff064'; ctx.font = 'bold 26px Arial';
  ctx.fillText('Controls', W / 2 - 48, py + 38);

  ctx.font = 'bold 16px Arial'; ctx.fillStyle = '#fff';
  let lines = [
    ['WASD / Arrows', 'Move'],
    ['SPACE', 'Puff Up (destroy enemies)'],
    ['SHIFT', 'Dash (quick burst)'],
    ['H', 'Toggle this help'],
  ];
  let ly = py + 68;
  lines.forEach(([key, desc]) => {
    // Key badge
    let kw = ctx.measureText(key).width + 16;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    fillRR(ctx, px + 24, ly - 14, kw, 24, 6);
    ctx.fillStyle = '#ffdc32'; ctx.fillText(key, px + 32, ly + 4);
    ctx.fillStyle = '#c8dcff'; ctx.font = '15px Arial';
    ctx.fillText(desc, px + 44 + kw, ly + 4);
    ctx.font = 'bold 16px Arial';
    ly += 34;
  });

  // Tip at bottom
  ctx.font = '13px Arial'; ctx.fillStyle = 'rgba(200,220,255,0.6)';
  ctx.fillText('Collect food & power-ups! Press any key to play...', W / 2 - 155, py + ph - 16);
}

function drawHelpButton() {
  // "?" button in top-right
  let bx = W - 42, by = 60;
  ctx.fillStyle = helpHover ? 'rgba(100,200,255,0.35)' : 'rgba(255,255,255,0.12)';
  fillRR(ctx, bx, by, 32, 32, 10);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
  strokeRR(ctx, bx, by, 32, 32, 10); ctx.lineWidth = 1;
  ctx.fillStyle = helpHover ? '#fff' : 'rgba(255,255,255,0.7)'; ctx.font = 'bold 20px Arial';
  ctx.fillText('?', bx + 10, by + 23);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, H);
  let pw = 400, ph = 220, pxp = W / 2 - pw / 2, pyp = H / 2 - ph / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  fillRR(ctx, pxp, pyp, pw, ph, 24);
  ctx.strokeStyle = 'rgba(19,46,99,0.25)'; ctx.lineWidth = 3;
  strokeRR(ctx, pxp, pyp, pw, ph, 24); ctx.lineWidth = 1;

  ctx.fillStyle = '#132e63'; ctx.font = 'bold 42px Arial'; ctx.fillText('Game Over!', W / 2 - 120, pyp + 55);
  ctx.font = 'bold 26px Arial'; ctx.fillText('Score: ' + p.score, W / 2 - 50, pyp + 95);
  ctx.font = 'bold 20px Arial'; ctx.fillStyle = '#3c3c50';
  ctx.fillText('Wave reached: ' + wave, W / 2 - 65, pyp + 125);
  ctx.fillText('High Score: ' + highscore, W / 2 - 60, pyp + 155);
  if (newHighscore) { ctx.fillStyle = '#ebb400'; ctx.font = 'bold 22px Arial'; ctx.fillText('NEW HIGH SCORE!', W / 2 - 95, pyp + 185); }
  if (Math.floor(tick / 30) % 2 === 0) { ctx.fillStyle = '#505078'; ctx.font = 'bold 18px Arial'; ctx.fillText('Press R to Restart', W / 2 - 85, pyp + ph + 30); }
}

// roundRect helper removed - using fillRR/strokeRR instead

// ========== GAME LOOP ==========
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
